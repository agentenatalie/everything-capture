    <script>
        const grid = document.getElementById('grid');
        const stats = document.getElementById('stats');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalShell = modalOverlay.querySelector('.modal');
        const commandOverlay = document.getElementById('commandOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalFooter = document.getElementById('modalFooter');
        const readerStatusDots = document.getElementById('readerStatusDots');
        const closeModal = document.getElementById('closeModal');
        const toggleFullscreenBtn = document.getElementById('toggleFullscreenBtn');
        const urlInput = document.getElementById('urlInput');
        const extractBtnLabel = document.getElementById('extractBtnLabel');
        const extractBtnMeta = document.getElementById('extractBtnMeta');
        const clipboardBtn = document.getElementById('clipboardBtn');
        const clipboardBtnLabel = document.getElementById('clipboardBtnLabel');
        const extractBtn = document.getElementById('extractBtn');
        const commandHelpText = document.getElementById('commandHelpText');
        const commandResults = document.getElementById('commandResults');
        const toast = document.getElementById('toast');
        const filterInput = document.getElementById('filterInput');
        const platformFilter = document.getElementById('platformFilter');
        const galleryViewBtn = document.getElementById('galleryViewBtn');
        const listViewBtn = document.getElementById('listViewBtn');

        // Settings elements
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const closeSettingsModal = document.getElementById('closeSettingsModal');
        const btnSaveSettings = document.getElementById('saveSettingsBtn');
        const notionStatusText = document.getElementById('notionStatusText');
        const obsidianStatusText = document.getElementById('obsidianStatusText');
        const obsidianFolderPathInput = document.getElementById('obsidianFolderPath');
        const obsidianTargetHint = document.getElementById('obsidianTargetHint');
        const testObsidianBtn = document.getElementById('testObsidianBtn');
        const notionDbIdInput = document.getElementById('notionDbId');
        const notionDbSelect = document.getElementById('notionDbSelect');
        const refreshNotionDbsBtn = document.getElementById('refreshNotionDbsBtn');
        const notionTargetHint = document.getElementById('notionTargetHint');

        const iconCalendar = '<svg class="inline-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 3v3M17 3v3M4 9h16M6.5 5h11A1.5 1.5 0 0 1 19 6.5v11A1.5 1.5 0 0 1 17.5 19h-11A1.5 1.5 0 0 1 5 17.5v-11A1.5 1.5 0 0 1 6.5 5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const iconText = '<svg class="inline-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7.5h14M5 12h14M5 16.5h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

        let itemsData = [];
        let currentView = 'gallery';
        let filteredEntries = [];
        let commandSearchResults = [];
        let currentOpenItemId = null;
        let isModalFullscreen = false;
        let latestVisibleCount = 0;
        let latestReturnedCount = 0;
        let latestTotalCount = 0;
        let librarySearchTimer = null;
        let commandSearchTimer = null;
        let libraryRequestId = 0;
        let commandRequestId = 0;
        let remoteSyncRefreshTimer = null;
        let remoteSyncRefreshInFlight = false;

        // Settings Logic
        function setNotionStatus(data) {
            if (data?.notion_ready) {
                notionStatusText.textContent = '状态：已连接，可同步到 Notion。';
                notionStatusText.style.color = '#1f7a4d';
                return;
            }

            if (data?.notion_api_token) {
                const missingDatabase = (data.notion_missing_fields || []).includes('notion_database_id');
                notionStatusText.textContent = missingDatabase
                    ? '状态：已完成 OAuth，但还没有选择同步目标，当前不能同步。'
                    : '状态：已授权，但配置仍不完整。';
                notionStatusText.style.color = '#b7791f';
                return;
            }

            notionStatusText.textContent = '状态：未连接';
            notionStatusText.style.color = '#6b7280';
        }

        function setObsidianStatus(data) {
            if (data?.obsidian_ready) {
                obsidianStatusText.textContent = '状态：已配置，可同步到 Obsidian。';
                obsidianStatusText.style.color = '#1f7a4d';
                setObsidianTargetHint(data);
                return;
            }

            const missingUrl = (data?.obsidian_missing_fields || []).includes('obsidian_rest_api_url');
            const missingKey = (data?.obsidian_missing_fields || []).includes('obsidian_api_key');
            if (missingUrl || missingKey) {
                const missingLabels = [];
                if (missingUrl) missingLabels.push('REST API URL');
                if (missingKey) missingLabels.push('API Key');
                obsidianStatusText.textContent = `状态：未完成配置，缺少 ${missingLabels.join(' / ')}。`;
                obsidianStatusText.style.color = '#b7791f';
                setObsidianTargetHint(data);
                return;
            }

            obsidianStatusText.textContent = '状态：未配置';
            obsidianStatusText.style.color = '#6b7280';
            setObsidianTargetHint(data);
        }

        function setObsidianTargetHint(data) {
            const baseUrl = (data?.obsidian_rest_api_url || document.getElementById('obsidianApiUrl').value || '').trim();
            const folderPath = (data?.obsidian_folder_path || obsidianFolderPathInput.value || '').trim().replace(/^\/+|\/+$/g, '');
            const locationText = folderPath
                ? `当前写入：当前打开的 Obsidian Vault /${folderPath}`
                : '当前写入：当前打开的 Obsidian Vault 根目录';

            if (!baseUrl) {
                obsidianTargetHint.textContent = '当前尚未配置 Obsidian REST API URL，无法判断写入位置。';
                return;
            }

            obsidianTargetHint.textContent = `${locationText}。文件名格式：标题-短ID.md。REST API：${baseUrl}`;
        }

        function setNotionTargetHint(databases = [], selectedValue = '') {
            const normalizedValue = (selectedValue || notionDbSelect.value || notionDbIdInput.value || '').trim();
            const matched = databases.find((database) =>
                database.id === normalizedValue || database.url === normalizedValue
            );
            const hasDatabaseTarget = databases.some((database) => database.object === 'database');

            if (matched?.object === 'database') {
                notionTargetHint.textContent = `当前目标是 Database: ${matched.title || 'Untitled'}。同步成功后会作为新页面写入该数据库。`;
                notionTargetHint.style.color = '#1f7a4d';
                return;
            }

            if (matched?.object === 'page') {
                notionTargetHint.textContent = `当前目标是普通 Page: ${matched.title || 'Untitled'}。同步成功后会在这个页面下创建子页面，不会写入数据库视图。若你想写入数据库，请在 Notion 中直接把数据库共享给当前集成，并重新选择那个 Database。`;
                notionTargetHint.style.color = '#b7791f';
                return;
            }

            if (databases.length && !hasDatabaseTarget) {
                notionTargetHint.textContent = '当前集成只看到了 Page，没有看到任何 Database。通常这表示你共享的是页面，而不是数据库本身。';
                notionTargetHint.style.color = '#b7791f';
                return;
            }

            if (normalizedValue) {
                notionTargetHint.textContent = '当前填写的目标尚未在可访问列表中匹配到，可能是旧 ID，保存或同步时后端会尝试自动修复。';
                notionTargetHint.style.color = '#6b7280';
                return;
            }

            notionTargetHint.textContent = '当前尚未解析到有效的 Notion 同步目标。';
            notionTargetHint.style.color = '#6b7280';
        }

        async function loadNotionDatabases(selectedValue = '') {
            notionDbSelect.innerHTML = '<option value="">先完成 OAuth，再从这里选择</option>';
            const hasToken = document.getElementById('notionApiToken').value.trim();
            if (!hasToken) {
                setNotionTargetHint([], selectedValue);
                return [];
            }

            refreshNotionDbsBtn.disabled = true;
            refreshNotionDbsBtn.innerText = '刷新中...';
            try {
                const res = await fetch('/api/connect/notion/databases');
                const data = await res.json();
                if (!res.ok) {
                    console.error('Failed to load Notion databases', data.detail);
                    setNotionTargetHint([], selectedValue);
                    return [];
                }

                const databases = data.results || [];
                if (!databases.length) {
                    notionDbSelect.innerHTML = '<option value="">没有可访问的页面或数据库，请先在 Notion 中把目标页面/数据库共享给当前集成</option>';
                    setNotionTargetHint([], selectedValue);
                    return [];
                }
                notionDbSelect.innerHTML = '<option value="">选择一个 Notion 页面或数据库</option>';
                for (const database of databases) {
                    const option = document.createElement('option');
                    option.value = database.id;
                    const shortId = database.id ? database.id.slice(0, 8) : 'unknown';
                    const objectLabel = database.object === 'database' ? 'Database' : 'Page';
                    option.textContent = `${database.title || 'Untitled'} [${objectLabel}] (${shortId})`;
                    notionDbSelect.appendChild(option);
                }

                const currentValue = (selectedValue || notionDbIdInput.value || '').trim();
                const matched = databases.find((database) =>
                    database.id === currentValue || database.url === currentValue
                );
                if (matched) {
                    notionDbSelect.value = matched.id;
                }
                setNotionTargetHint(databases, currentValue);
                return databases;
            } catch (e) {
                console.error('Failed to load Notion databases', e);
                setNotionTargetHint([], selectedValue);
                return [];
            } finally {
                refreshNotionDbsBtn.disabled = false;
                refreshNotionDbsBtn.innerText = '刷新';
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/settings');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('notionApiToken').value = data.notion_api_token || '';
                    document.getElementById('notionClientId').value = data.notion_client_id || '';
                    document.getElementById('notionClientSecret').value = data.notion_client_secret || '';
                    document.getElementById('notionRedirectUri').value = data.notion_redirect_uri || '';
                    notionDbIdInput.value = data.notion_database_id || '';
                    document.getElementById('obsidianApiUrl').value = data.obsidian_rest_api_url || '';
                    document.getElementById('obsidianApiKey').value = data.obsidian_api_key || '';
                    document.getElementById('obsidianFolderPath').value = data.obsidian_folder_path || '';
                    document.getElementById('autoSyncTarget').value = data.auto_sync_target || 'none';
                    setNotionStatus(data);
                    setObsidianStatus(data);
                    await loadNotionDatabases(data.notion_database_id || '');
                    return data;
                }
            } catch (e) {
                console.error("Failed to load settings", e);
            }
            return null;
        }

        settingsBtn.onclick = () => {
            settingsOverlay.classList.add('active');
            loadSettings();
        };

        closeSettingsModal.onclick = () => {
            settingsOverlay.classList.remove('active');
        };

        btnSaveSettings.onclick = async () => {
            const payload = {
                notion_client_id: document.getElementById('notionClientId').value.trim() || null,
                notion_client_secret: document.getElementById('notionClientSecret').value.trim() || null,
                notion_redirect_uri: document.getElementById('notionRedirectUri').value.trim() || null,
                notion_database_id: notionDbIdInput.value.trim() || null,
                obsidian_rest_api_url: document.getElementById('obsidianApiUrl').value.trim() || null,
                obsidian_api_key: document.getElementById('obsidianApiKey').value.trim() || null,
                obsidian_folder_path: document.getElementById('obsidianFolderPath').value.trim() || null,
                auto_sync_target: document.getElementById('autoSyncTarget').value
            };
            btnSaveSettings.disabled = true;
            btnSaveSettings.innerText = "保存中...";
            try {
                const res = await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    const data = await res.json();
                    setNotionStatus(data);
                    setObsidianStatus(data);
                    await loadNotionDatabases(data.notion_database_id || '');
                    if (data.notion_ready || data.obsidian_ready) {
                        showToast('设置已保存，集成已更新。', 'success');
                    } else {
                        showToast('设置已保存，但仍有未完成的集成配置。', 'info');
                    }
                    settingsOverlay.classList.remove('active');
                } else {
                    showToast('保存设置失败', 'error');
                }
            } catch (e) {
                showToast('保存出错: ' + e.message, 'error');
            } finally {
                btnSaveSettings.disabled = false;
                btnSaveSettings.innerText = "保存设置";
            }
        };

        document.getElementById('connectNotionBtn').onclick = async () => {
            const btn = document.getElementById('connectNotionBtn');
            btn.disabled = true;
            btn.innerText = "Connecting...";
            try {
                // First save the current OAuth credentials so the backend knows them
                const payload = {
                    notion_client_id: document.getElementById('notionClientId').value.trim() || null,
                    notion_client_secret: document.getElementById('notionClientSecret').value.trim() || null,
                    notion_redirect_uri: document.getElementById('notionRedirectUri').value.trim() || null
                };
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const res = await fetch('/api/connect/notion/oauth/url');
                if (res.ok) {
                    const data = await res.json();
                    window.location.href = data.url;
                } else {
                    const data = await res.json();
                    showToast('无法获取授权链接: ' + (data.detail || '检查配置'), 'error');
                    btn.disabled = false;
                    btn.innerText = "Connect to Notion";
                }
            } catch (e) {
                showToast('请求出错: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerText = "Connect to Notion";
            }
        };

        function getCurrentNotionOptions() {
            return Array.from(notionDbSelect.options)
                .filter((option) => option.value)
                .map((option) => ({
                    id: option.value,
                    object: option.textContent.includes('[Database]') ? 'database' : 'page',
                    title: option.textContent
                }));
        }

        notionDbSelect.onchange = () => {
            if (notionDbSelect.value) {
                notionDbIdInput.value = notionDbSelect.value;
            }
            setNotionTargetHint(getCurrentNotionOptions(), notionDbSelect.value);
        };

        notionDbIdInput.addEventListener('input', () => {
            setNotionTargetHint(getCurrentNotionOptions(), notionDbIdInput.value.trim());
        });

        obsidianFolderPathInput.addEventListener('input', () => {
            setObsidianTargetHint({
                obsidian_rest_api_url: document.getElementById('obsidianApiUrl').value.trim(),
                obsidian_folder_path: obsidianFolderPathInput.value.trim(),
            });
        });

        refreshNotionDbsBtn.onclick = async () => {
            await loadNotionDatabases(notionDbIdInput.value.trim());
            if (!notionDbSelect.value && notionDbIdInput.value.trim()) {
                showToast('当前 Database ID/URL 已保留，但不在可访问列表中，请确认数据库已向 Notion 集成开放。', 'info');
            }
        };

        testObsidianBtn.onclick = async () => {
            testObsidianBtn.disabled = true;
            testObsidianBtn.innerText = '验证中...';
            try {
                const response = await fetch('/api/connect/obsidian/test', { method: 'POST' });
                const data = await response.json();
                if (!response.ok) {
                    showToast(`Obsidian 验证失败: ${data.detail || '未知错误'}`, 'error');
                    return;
                }

                setObsidianTargetHint({
                    obsidian_rest_api_url: document.getElementById('obsidianApiUrl').value.trim(),
                    obsidian_folder_path: document.getElementById('obsidianFolderPath').value.trim(),
                });
                showToast(`Obsidian 验证成功：${data.write_location_hint}`, 'success');
            } catch (error) {
                showToast(`Obsidian 验证失败: ${error.message}`, 'error');
            } finally {
                testObsidianBtn.disabled = false;
                testObsidianBtn.innerText = '验证 Obsidian 写入';
            }
        };

        window.addEventListener('focus', () => {
            triggerRemoteSyncRefresh();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                triggerRemoteSyncRefresh();
            }
        });

        remoteSyncRefreshTimer = window.setInterval(() => {
            triggerRemoteSyncRefresh();
        }, 15000);

        function openCommandPalette() {
            commandOverlay.classList.add('active');
            updateCommandPaletteState();
            requestAnimationFrame(() => {
                urlInput.focus();
                urlInput.select();
            });
        }

        function closeCommandPalette() {
            commandOverlay.classList.remove('active');
            urlInput.blur();
        }

        async function importFromClipboard() {
            if (!navigator.clipboard?.readText) {
                showToast('当前浏览器不支持读取剪贴板', 'error');
                return;
            }

            clipboardBtn.disabled = true;
            clipboardBtn.classList.add('is-loading');
            clipboardBtnLabel.textContent = '读取剪贴板中...';
            try {
                const text = (await navigator.clipboard.readText()).trim();
                if (!text) {
                    showToast('剪贴板为空', 'error');
                    return;
                }
                urlInput.value = text;
                updateCommandPaletteState();
                urlInput.focus();
                urlInput.select();
                showToast('已导入剪贴板内容', 'success');
            } catch (e) {
                showToast('读取剪贴板失败：' + e.message, 'error');
            } finally {
                clipboardBtn.disabled = false;
                clipboardBtn.classList.remove('is-loading');
                clipboardBtnLabel.textContent = '从剪贴板导入';
            }
        }

        function showToast(msg, type) {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        function setStatsMessage(message) {
            stats.classList.add('is-plain');
            stats.textContent = message;
        }

        function setStatsSummary(total, visible, returned, hasFilter) {
            stats.classList.remove('is-plain');
            if (hasFilter) {
                if (visible > returned) {
                    stats.innerHTML = `已收录 <strong>${total}</strong> 篇 <span class="stats-secondary">匹配 <strong>${visible}</strong> 篇，当前显示最新 <strong>${returned}</strong> 篇</span>`;
                    return;
                }
                stats.innerHTML = `已收录 <strong>${total}</strong> 篇 <span class="stats-secondary">显示 <strong>${visible}</strong> 篇</span>`;
                return;
            }
            if (total > returned) {
                stats.innerHTML = `已收录 <strong>${total}</strong> 篇 <span class="stats-secondary">当前显示最新 <strong>${returned}</strong> 篇</span>`;
                return;
            }
            stats.innerHTML = `已收录 <strong>${total}</strong> 篇内容`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replaceAll('`', '&#96;');
        }

        function truncateText(value, maxLength) {
            if (!value) return '';
            return value.length > maxLength ? `${value.slice(0, maxLength)}…` : value;
        }

        function isLikelyUrl(value) {
            if (!value) return false;
            try {
                const candidate = new URL(value);
                return candidate.protocol === 'http:' || candidate.protocol === 'https:';
            } catch (error) {
                return false;
            }
        }

        function getActiveSearchParams(limit = 200, qOverride = null) {
            const params = new URLSearchParams();
            const keyword = (qOverride ?? filterInput.value).trim();
            const platform = platformFilter.value;
            params.set('limit', String(limit));
            if (keyword) params.set('q', keyword);
            if (platform !== 'all') params.set('platform', platform);
            return params;
        }

        function scheduleLibrarySearch() {
            window.clearTimeout(librarySearchTimer);
            librarySearchTimer = window.setTimeout(() => {
                fetchItems();
            }, 180);
        }

        function scheduleCommandSearch(query) {
            window.clearTimeout(commandSearchTimer);
            commandSearchTimer = window.setTimeout(() => {
                fetchCommandResults(query);
            }, 150);
        }

        function clearCommandResults() {
            commandRequestId += 1;
            commandSearchResults = [];
            commandResults.innerHTML = '';
        }

        function uniquePreserveOrder(values) {
            const seen = new Set();
            return values.filter((value) => {
                const normalized = String(value || '').trim();
                if (!normalized || seen.has(normalized)) return false;
                seen.add(normalized);
                return true;
            });
        }

        function getItemImages(item) {
            return (item.media || [])
                .filter((media) => media.type === 'image' && media.url)
                .sort((a, b) => a.display_order - b.display_order);
        }

        function extractImageUrlsFromHtml(html) {
            return Array.from(
                String(html || '').matchAll(/<img[^>]+src=["']([^"']+)["'][^>]*>/gi),
                (match) => match[1]
            );
        }

        function hasSuspiciousRepeatedImages(imageUrls, mediaImageUrls) {
            const nonEmptyImageUrls = imageUrls.filter(Boolean);
            const uniqueInlineImages = uniquePreserveOrder(nonEmptyImageUrls);
            const uniqueMediaImages = uniquePreserveOrder(mediaImageUrls);
            return nonEmptyImageUrls.length > 1 && uniqueInlineImages.length === 1 && uniqueMediaImages.length > 1;
        }

        function parseContentBlocks(item) {
            if (!item.content_blocks_json) return null;
            try {
                const blocks = JSON.parse(item.content_blocks_json);
                return Array.isArray(blocks) ? blocks : null;
            } catch (error) {
                return null;
            }
        }

        function renderStructuredBlocks(blocks) {
            return blocks.map((block) => {
                if (block.type === 'text' && block.content) {
                    return `<p class="content-para">${escapeHtml(block.content).replace(/\n/g, '<br>')}</p>`;
                }
                if (block.type === 'image' && block.url) {
                    return `<div class="inline-img-wrap"><img src="${escapeAttribute(block.url)}" alt="" class="inline-img"></div>`;
                }
                return '';
            }).join('');
        }

        function buildInlineMediaFallback(item) {
            const paragraphs = String(item.canonical_text || '暂无内容')
                .split(/\n{2,}/)
                .map((paragraph) => paragraph.trim())
                .filter(Boolean);
            const imageUrls = uniquePreserveOrder(getItemImages(item).map((image) => image.url));

            if (!paragraphs.length) paragraphs.push('暂无内容');
            if (!imageUrls.length) {
                return `<div style="white-space:pre-wrap">${escapeHtml(item.canonical_text || '暂无内容').replace(/\n/g, '<br>')}</div>`;
            }

            const imageAnchors = new Map();
            imageUrls.forEach((url, index) => {
                const anchorIndex = Math.min(
                    paragraphs.length - 1,
                    Math.floor(((index + 1) * paragraphs.length) / (imageUrls.length + 1))
                );
                const bucket = imageAnchors.get(anchorIndex) || [];
                bucket.push(url);
                imageAnchors.set(anchorIndex, bucket);
            });

            let html = '';
            paragraphs.forEach((paragraph, index) => {
                html += `<p class="content-para">${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`;
                const anchoredImages = imageAnchors.get(index) || [];
                anchoredImages.forEach((url) => {
                    html += `<div class="inline-img-wrap"><img src="${escapeAttribute(url)}" alt="" class="inline-img"></div>`;
                });
            });
            return html;
        }

        function renderWebArticle(item, videos) {
            const mediaImageUrls = getItemImages(item).map((image) => image.url);
            const blocks = parseContentBlocks(item);
            let bodyHtml = '';

            if (blocks && blocks.length > 0) {
                const blockImageUrls = blocks
                    .filter((block) => block.type === 'image' && block.url)
                    .map((block) => block.url);
                const hasTextBlocks = blocks.some((block) => block.type === 'text' && block.content && block.content.trim());
                if (hasTextBlocks && !hasSuspiciousRepeatedImages(blockImageUrls, mediaImageUrls)) {
                    bodyHtml = renderStructuredBlocks(blocks);
                }
            }

            if (!bodyHtml && item.canonical_html) {
                const htmlImageUrls = extractImageUrlsFromHtml(item.canonical_html);
                if (!hasSuspiciousRepeatedImages(htmlImageUrls, mediaImageUrls)) {
                    bodyHtml = `<div class="article-html" style="margin-top: 0;">${item.canonical_html}</div>`;
                }
            }

            if (!bodyHtml) {
                bodyHtml = buildInlineMediaFallback(item);
            }

            let html = '';
            if (videos.length > 0) {
                html += `<div class="modal-media"><video controls preload="metadata"><source src="${escapeAttribute(videos[0].url)}" type="video/mp4"></video></div>`;
            }
            html += bodyHtml;
            return html;
        }

        function updateCommandPaletteState() {
            const value = urlInput.value.trim();
            const platformLabel = platformFilter.options[platformFilter.selectedIndex]?.textContent || '全部';

            if (!value) {
                extractBtn.disabled = true;
                extractBtnLabel.textContent = '粘贴链接或输入关键词';
                extractBtnMeta.textContent = 'ENTER';
                commandHelpText.innerHTML = '输入 <strong>链接</strong> 会直接导入，输入 <strong>文字</strong> 会搜索已保存内容。';
                clearCommandResults();
                return;
            }

            extractBtn.disabled = false;
            if (isLikelyUrl(value)) {
                extractBtnLabel.textContent = '导入这个链接';
                extractBtnMeta.textContent = 'ENTER';
                commandHelpText.innerHTML = '识别为 <strong>链接</strong>，按 Enter 会直接导入到 Everything Capture。';
                clearCommandResults();
                return;
            }

            extractBtnLabel.textContent = `搜索资料库 “${truncateText(value, 18)}”`;
            extractBtnMeta.textContent = `${platformLabel} · ENTER`;
            commandHelpText.innerHTML = `识别为 <strong>搜索词</strong>，会在 title、content、source_url 中全文搜索，并按最新时间排序。`;
            scheduleCommandSearch(value);
        }

        async function fetchCommandResults(query) {
            const trimmedQuery = (query || '').trim();
            if (!trimmedQuery || isLikelyUrl(trimmedQuery)) {
                clearCommandResults();
                return;
            }

            const requestId = ++commandRequestId;
            commandResults.innerHTML = '<div class="suggestion-empty">搜索中...</div>';
            try {
                const response = await fetch(`/api/items?${getActiveSearchParams(6, trimmedQuery).toString()}`);
                if (!response.ok) throw new Error('API Error');
                const results = await response.json();
                if (requestId !== commandRequestId) return;
                commandSearchResults = results;
                if (!results.length) {
                    commandResults.innerHTML = '<div class="suggestion-empty">没有找到匹配内容</div>';
                    return;
                }

                commandResults.innerHTML = results.map((item) => {
                    const snippet = truncateText(item.canonical_text || item.source_url || '无正文内容', 44);
                    return `
                        <button class="suggestion-item" type="button" onclick="openCommandResult('${item.id}')">
                            <div class="command-result-body">
                                <span class="command-result-title">${escapeHtml(item.title || '无标题')}</span>
                                <span class="command-result-snippet">${escapeHtml(snippet)}</span>
                            </div>
                            <span class="suggestion-meta">${platformDisplayLabel(item)} · ${formatDate(item.created_at)}</span>
                        </button>
                    `;
                }).join('');
            } catch (error) {
                if (requestId !== commandRequestId) return;
                commandResults.innerHTML = '<div class="suggestion-empty">搜索失败，请稍后重试</div>';
            }
        }

        function applyCommandSearch() {
            const query = urlInput.value.trim();
            if (!query) {
                showToast('请输入关键词', 'error');
                return;
            }
            filterInput.value = query;
            fetchItems();
            closeCommandPalette();
        }

        function runCommandAction() {
            const value = urlInput.value.trim();
            if (!value) {
                showToast('请输入链接或关键词', 'error');
                return;
            }
            if (isLikelyUrl(value)) {
                extractURL();
                return;
            }
            applyCommandSearch();
        }

        function openCommandResult(itemId) {
            const item = commandSearchResults.find((entry) => entry.id === itemId);
            if (!item) return;
            filterInput.value = urlInput.value.trim();
            fetchItems();
            closeCommandPalette();
            openModalByItem(item);
        }

        async function extractURL() {
            const url = urlInput.value.trim();
            if (!url) { showToast('请输入链接', 'error'); return; }
            if (!url.startsWith('http')) { showToast('请输入有效的 http/https 链接', 'error'); return; }

            extractBtn.disabled = true;
            extractBtn.classList.add('is-loading');
            extractBtnLabel.textContent = '处理中...';
            try {
                const resp = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await resp.json();
                if (resp.ok) {
                    const mediaInfo = data.media_count > 0 ? `，${data.media_count} 个媒体` : '';
                    showToast(`收录成功：${data.title} (${data.text_length} 字${mediaInfo}，平台：${data.platform})`, 'success');
                    urlInput.value = '';
                    clearCommandResults();
                    updateCommandPaletteState();
                    closeCommandPalette();
                    fetchItems();
                } else {
                    showToast(`失败：${data.detail || '未知错误'}`, 'error');
                }
            } catch (e) {
                showToast('网络错误：' + e.message, 'error');
            } finally {
                extractBtn.disabled = false;
                extractBtn.classList.remove('is-loading');
                updateCommandPaletteState();
            }
        }

        urlInput.addEventListener('input', updateCommandPaletteState);
        urlInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                runCommandAction();
            }
        });
        commandOverlay.addEventListener('click', e => {
            if (e.target === commandOverlay) closeCommandPalette();
        });
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if ((e.metaKey || e.ctrlKey) && key === 'k') {
                e.preventDefault();
                if (commandOverlay.classList.contains('active')) closeCommandPalette();
                else openCommandPalette();
            }
            if (e.key === 'Escape' && commandOverlay.classList.contains('active')) {
                closeCommandPalette();
                return;
            }
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModalDialog();
            }
        });

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${month}/${day}`;
        }

        function renderSyncBadges(item) {
            return `
                <div class="knowledge-dots" aria-label="知识库状态">
                    <span class="knowledge-dot notion ${item.notion_page_id ? 'is-ready' : 'is-idle'}" title="Notion${item.notion_page_id ? '已同步' : '未同步'}"></span>
                    <span class="knowledge-dot obsidian ${item.obsidian_path ? 'is-ready' : 'is-idle'}" title="Obsidian${item.obsidian_path ? '已同步' : '未同步'}"></span>
                </div>
            `;
        }

        function setModalFullscreen(nextValue) {
            isModalFullscreen = typeof nextValue === 'boolean' ? nextValue : !isModalFullscreen;
            modalShell.classList.toggle('is-fullscreen', isModalFullscreen);
            toggleFullscreenBtn.setAttribute('aria-label', isModalFullscreen ? '退出全屏' : '全屏阅读');
            toggleFullscreenBtn.innerHTML = isModalFullscreen
                ? `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3H3v6M15 3h6v6M21 15v6h-6M3 15v6h6"></path></svg>`
                : `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M8 21H3v-5"></path></svg>`;
        }

        function getItemThumbnail(item) {
            if (!item.media || item.media.length === 0) return null;
            const images = item.media.filter(m => m.type === 'image');
            const covers = item.media.filter(m => m.type === 'cover');

            // 优先选择封面图 (Cover 通常是静态的)
            if (covers.length > 0) return covers[0];

            // 其次选择非 GIF 的图片
            const staticImages = images.filter(m => !m.url.toLowerCase().endsWith('.gif'));
            if (staticImages.length > 0) return staticImages[0];

            // 最后没办法了再选第一张图 (可能是 GIF)
            return images[0] || null;
        }

        function normalizePlatform(platform, sourceUrl = '') {
            const value = (platform || '').toLowerCase();
            if (value.includes('douyin') || value.includes('抖音') || value.includes('tiktok')) return 'douyin';
            if (value.includes('xiaohongshu') || value.includes('小红书') || value.includes('rednote') || value === 'xhs') return 'xiaohongshu';
            if (value.includes('wechat') || value.includes('weixin') || sourceUrl.includes('mp.weixin.qq.com') || sourceUrl.includes('weixin.qq.com')) return 'wechat';
            if (value === 'x' || value.includes('twitter')) return 'x';
            if (value === 'general' || value === 'generic' || value === 'web' || value === 'site') return 'web';
            return value;
        }

        function platformDisplayLabel(item) {
            const platform = normalizePlatform(item.platform || '', (item.source_url || '').toLowerCase());
            if (platform === 'web') return 'web';
            return platform || 'web';
        }

        async function fetchItems() {
            const requestId = ++libraryRequestId;
            try {
                const response = await fetch(`/api/items?${getActiveSearchParams(200).toString()}`);
                if (!response.ok) throw new Error('API Error');
                const totalCount = Number(response.headers.get('X-Total-Count') || '0');
                const visibleCount = Number(response.headers.get('X-Visible-Count') || '0');
                const returnedCount = Number(response.headers.get('X-Returned-Count') || '0');
                const nextItems = await response.json();
                if (requestId !== libraryRequestId) return;
                itemsData = nextItems;
                filteredEntries = itemsData;
                latestTotalCount = totalCount;
                latestVisibleCount = visibleCount;
                latestReturnedCount = returnedCount || itemsData.length;
                const hasKeyword = !!filterInput.value.trim();
                const hasPlatformFilter = platformFilter.value !== 'all';
                setStatsSummary(
                    latestTotalCount || itemsData.length,
                    latestVisibleCount || itemsData.length,
                    latestReturnedCount || itemsData.length,
                    hasKeyword || hasPlatformFilter
                );
                renderItems(filteredEntries);
                refreshRemoteSyncStatus(nextItems.map((item) => item.id), requestId);
            } catch (error) {
                setStatsMessage('加载失败');
                grid.className = 'grid';
                grid.innerHTML = '<div class="empty-state">无法连接到后端 API</div>';
            }
        }

        async function refreshRemoteSyncStatus(itemIds, requestId) {
            if (!Array.isArray(itemIds) || itemIds.length === 0) return;
            if (remoteSyncRefreshInFlight) return;

            try {
                remoteSyncRefreshInFlight = true;
                const response = await fetch('/api/connect/sync-status/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_ids: itemIds }),
                });
                if (!response.ok) return;

                const data = await response.json();
                if (requestId !== libraryRequestId || !data || !Array.isArray(data.items)) return;

                const statusMap = new Map(data.items.map((item) => [item.id, item]));
                let changed = false;

                itemsData = itemsData.map((item) => {
                    const nextStatus = statusMap.get(item.id);
                    if (!nextStatus) return item;
                    if (item.notion_page_id === nextStatus.notion_page_id && item.obsidian_path === nextStatus.obsidian_path) {
                        return item;
                    }
                    changed = true;
                    return {
                        ...item,
                        notion_page_id: nextStatus.notion_page_id || null,
                        obsidian_path: nextStatus.obsidian_path || null,
                    };
                });

                commandSearchResults = commandSearchResults.map((item) => {
                    const nextStatus = statusMap.get(item.id);
                    if (!nextStatus) return item;
                    return {
                        ...item,
                        notion_page_id: nextStatus.notion_page_id || null,
                        obsidian_path: nextStatus.obsidian_path || null,
                    };
                });

                filteredEntries = itemsData;

                if (changed) {
                    renderItems(filteredEntries);
                    const refreshedItem = currentOpenItemId
                        ? itemsData.find((item) => item.id === currentOpenItemId) || commandSearchResults.find((item) => item.id === currentOpenItemId)
                        : null;
                    if (refreshedItem && currentOpenItemId === refreshedItem.id) {
                        openModalByItem(refreshedItem);
                    }
                }
            } catch (error) {
                console.warn('Failed to refresh remote sync status', error);
            } finally {
                remoteSyncRefreshInFlight = false;
            }
        }

        function triggerRemoteSyncRefresh() {
            if (!Array.isArray(itemsData) || itemsData.length === 0) return;
            refreshRemoteSyncStatus(itemsData.map((item) => item.id), libraryRequestId);
        }

        function renderItems(entries) {
            if (entries.length === 0) {
                grid.className = currentView === 'gallery' ? 'grid' : 'list-view';
                grid.innerHTML = filterInput.value.trim() || platformFilter.value !== 'all'
                    ? '<div class="empty-state">没有找到匹配内容，请换个关键词或平台试试。</div>'
                    : '<div class="empty-state">暂无收录内容，请在 App 中添加。</div>';
                return;
            }

            if (currentView === 'list') {
                grid.className = 'list-view';
                grid.innerHTML = entries.map((item) => {
                    const textPreview = item.canonical_text ? item.canonical_text.substring(0, 120) + '...' : '无正文内容';
                    const length = item.canonical_text ? item.canonical_text.length : 0;
                    const thumb = getItemThumbnail(item);
                    const activeClass = currentOpenItemId === item.id ? ' is-active' : '';
                    const thumbHtml = thumb
                        ? `<div class="list-thumb"><img src="${thumb.url}" loading="lazy" alt=""></div>`
                        : `<div class="list-thumb"></div>`;
                    return `
                        <div class="list-row${activeClass}" onclick="openModalById('${item.id}')">
                            <div class="list-main">
                                ${thumbHtml}
                                <div class="list-content">
                                    <div class="list-title-row">
                                        <div class="list-title">${item.title || '无标题'}</div>
                                    </div>
                                    <div class="list-preview">${textPreview}</div>
                                </div>
                            </div>
                            <div class="list-side">
                                <div class="list-meta">
                                    <span class="list-stat">${platformDisplayLabel(item)}</span>
                                    <span class="list-stat">${formatDate(item.created_at)}</span>
                                    <span class="list-stat">${length} 字</span>
                                </div>
                                <div class="list-actions">
                                    ${renderSyncBadges(item)}
                                    <button onclick="deleteItem('${item.id}', event)" class="delete-btn" title="删除">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                    </button>
                                    <a href="${item.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">原文 ↗</a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                return;
            }

            grid.className = 'grid';
            grid.innerHTML = entries.map((item) => {
                const textPreview = item.canonical_text ? item.canonical_text.substring(0, 150) + '...' : '无正文内容';
                const length = item.canonical_text ? item.canonical_text.length : 0;
                const activeClass = currentOpenItemId === item.id ? ' is-active' : '';

                // 生成媒体缩略图
                let thumbnailHtml = '';
                const thumb = getItemThumbnail(item);
                if (thumb) {
                    const images = item.media.filter(m => m.type === 'image');
                    const videos = item.media.filter(m => m.type === 'video');
                    let badge = '';
                    if (images.length > 1) badge = `<span class="media-badge">${images.length} 张图片</span>`;
                    else if (videos.length > 0) badge = `<span class="media-badge">▶ 视频</span>`;
                    thumbnailHtml = `<div class="card-media"><img src="${thumb.url}" loading="lazy" alt="">${badge}</div>`;
                }

                return `
                    <div class="card${activeClass}" onclick="openModalById('${item.id}')">
                        ${thumbnailHtml}
                        <div class="card-header">
                            <h3 class="title">${item.title || '无标题'}</h3>
                        </div>
                        <div class="preview">${textPreview}</div>
                        <div class="footer">
                            <div class="meta">
                                <span class="meta-item">${iconCalendar}${formatDate(item.created_at)}</span>
                                <span class="meta-item">${iconText}${length} </span>
                            </div>
                            <div class="footer-actions">
                                ${renderSyncBadges(item)}
                                <button onclick="deleteItem('${item.id}', event)" class="delete-btn" title="删除">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                </button>
                                <a href="${item.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">
                                    原文 ↗
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setView(view) {
            currentView = view;
            galleryViewBtn.classList.toggle('active', view === 'gallery');
            listViewBtn.classList.toggle('active', view === 'list');
            renderItems(filteredEntries);
        }

        filterInput.addEventListener('input', scheduleLibrarySearch);
        platformFilter.addEventListener('change', () => {
            updateCommandPaletteState();
            fetchItems();
        });
        galleryViewBtn.addEventListener('click', () => setView('gallery'));
        listViewBtn.addEventListener('click', () => setView('list'));

        async function deleteItem(id, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这条内容吗？删除后不可恢复。')) return;

            try {
                const response = await fetch(`/api/items/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('已删除', 'deleted');
                    fetchItems();
                } else {
                    const data = await response.json();
                    showToast('删除失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('网络错误：' + error.message, 'error');
            }
        }

        function openModalById(itemId) {
            const item = itemsData.find((entry) => entry.id === itemId);
            if (!item) return;
            openModalByItem(item);
        }

        function openModalByItem(item) {
            currentOpenItemId = item.id;
            renderItems(filteredEntries);
            setModalFullscreen(false);
            modalTitle.innerText = item.title || '无标题';
            readerStatusDots.innerHTML = `
                <span class="knowledge-dot notion ${item.notion_page_id ? 'is-ready' : 'is-idle'}" title="Notion${item.notion_page_id ? '已同步' : '未同步'}"></span>
                <span class="knowledge-dot obsidian ${item.obsidian_path ? 'is-ready' : 'is-idle'}" title="Obsidian${item.obsidian_path ? '已同步' : '未同步'}"></span>
            `;
            const platform = normalizePlatform(item.platform || '');
            const isCarouselPlatform = platform === 'xiaohongshu' || platform === 'douyin';
            const videos = (item.media || []).filter(m => m.type === 'video');

            if (isCarouselPlatform) {
                // ── XHS / 抖音：图片轮播在顶部 ──────────────────────────────
                const images = (item.media || []).filter(m => m.type === 'image').sort((a, b) => a.display_order - b.display_order);
                let html = '';
                if (videos.length > 0) {
                    const cover = (item.media || []).find(m => m.type === 'cover');
                    html += `<div class="modal-media"><video controls preload="metadata" poster="${cover ? cover.url : ''}"><source src="${videos[0].url}" type="video/mp4"></video></div>`;
                }
                if (images.length > 0) {
                    html += `<div class="modal-media"><div class="media-gallery">${images.map(img => `<img src="${img.url}" alt="">`).join('')}</div>${images.length > 1 ? '<div class="gallery-hint">← 左右滑动查看更多图片 →</div>' : ''}</div>`;
                }
                html += `<div style="white-space:pre-wrap">${item.canonical_text || '暂无内容'}</div>`;
                modalContent.innerHTML = html;

            } else {
                // ── 通用网页 / 微信：优先恢复原始图文流，再按稳妥策略回退 ──────────────
                modalContent.innerHTML = renderWebArticle(item, videos);
            }

            modalFooter.innerHTML = `
                <div class="modal-footer-actions">
                    <button onclick="syncItem('${item.id}', 'notion')" class="extract-btn modal-action-btn">${item.notion_page_id ? '再次检查 Notion 同步' : '同步至 Notion'}</button>
                    <button onclick="syncItem('${item.id}', 'obsidian')" class="extract-btn modal-action-btn">${item.obsidian_path ? '再次检查 Obsidian 同步' : '同步至 Obsidian'}</button>
                    <button onclick="downloadZip('${item.id}')" class="extract-btn modal-action-btn">下载 ZIP</button>
                </div>
            `;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function syncItem(id, target) {
            showToast(`正在后台同步至 ${target}...`, 'info');
            try {
                const res = await fetch(`/api/connect/${target}/sync/${id}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    const currentItem = itemsData.find(item => item.id === id);
                    if (currentItem) {
                        if (target === 'notion' && data.notion_page_id) currentItem.notion_page_id = data.notion_page_id;
                        if (target === 'obsidian' && data.obsidian_path) currentItem.obsidian_path = data.obsidian_path;
                    }
                    const commandItem = commandSearchResults.find((item) => item.id === id);
                    if (commandItem) {
                        if (target === 'notion' && data.notion_page_id) commandItem.notion_page_id = data.notion_page_id;
                        if (target === 'obsidian' && data.obsidian_path) commandItem.obsidian_path = data.obsidian_path;
                    }
                    renderItems(filteredEntries);
                    const refreshedItem = itemsData.find(item => item.id === id) || commandSearchResults.find(item => item.id === id);
                    if (currentOpenItemId === id && refreshedItem) {
                        openModalByItem(refreshedItem);
                    }
                    if (target === 'notion' && data.target_object) {
                        const targetLabel = data.target_object === 'database' ? 'Database' : 'Page';
                        const targetName = data.target_title || data.target_id || 'Untitled';
                        showToast(`已同步到 Notion ${targetLabel}: ${targetName}`, 'success');
                    } else {
                        showToast(`同步成功 (ID: ${data[`${target}_page_id`] || data.obsidian_path || '已同步'})`, 'success');
                    }
                } else {
                    let message = data.detail || '未知错误';
                    if (typeof message === 'string' && message.includes('notion_database_id')) {
                        message = 'Notion 已授权，但还没有配置 Database ID/URL。请先在设置里选择目标数据库。';
                    }
                    showToast(`同步失败: ${message}`, 'error');
                }
            } catch (e) {
                showToast(`同步出错: ${e.message}`, 'error');
            }
        }

        function downloadZip(id) {
            window.location.href = `/api/items/${id}/export/zip`;
        }

        function closeModalDialog() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            currentOpenItemId = null;
            setModalFullscreen(false);
            readerStatusDots.innerHTML = '';
            modalFooter.innerHTML = '';
            renderItems(filteredEntries);
        }

        closeModal.onclick = () => {
            closeModalDialog();
        };

        closeModal.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                closeModalDialog();
            }
        });

        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModalDialog();
        };
        settingsOverlay.onclick = (e) => {
            if (e.target === settingsOverlay) closeSettingsModal.onclick();
        };

        toggleFullscreenBtn.onclick = () => {
            setModalFullscreen();
        };

        toggleFullscreenBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                setModalFullscreen();
            }
        });

        // Fetch on load
        fetchItems();
        updateCommandPaletteState();

        // Check URL for OAuth callback results
        const urlParams = new URLSearchParams(window.location.search);
        const notionAuth = urlParams.get('notion_auth');
        if (notionAuth === 'success') {
            setTimeout(async () => {
                const settings = await loadSettings();
                if (settings?.notion_ready) {
                    showToast('Notion 授权成功，已可直接同步。', 'success');
                } else {
                    showToast('Notion 授权成功，但还需要选择一个同步目标才能同步。', 'info');
                }
            }, 500);
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (notionAuth === 'partial') {
            setTimeout(async () => {
                await loadSettings();
                showToast('Notion 授权成功，但当前还缺少同步目标。请在设置里选择一个页面或数据库。', 'info');
            }, 500);
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (notionAuth === 'failed') {
            const errorStr = urlParams.get('error') || 'Unknown error';
            setTimeout(() => showToast(`Notion Authentication Failed: ${errorStr}`, 'error'), 500);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>

</html>
