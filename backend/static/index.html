<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everything Capture - 收录看板</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #f3f4f7;
            --bg-overlay: #eef1f5;
            --surface-bg: rgba(255, 255, 255, 0.58);
            --surface-strong: rgba(255, 255, 255, 0.72);
            --card-bg: rgba(255, 255, 255, 0.56);
            --card-border: rgba(255, 255, 255, 0.76);
            --text-primary: #1f2127;
            --text-secondary: #667085;
            --accent: #0071e3;
            --accent-hover: #0062c6;
            --success: #20a56a;
            --error: #cc3b3b;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Helvetica Neue", sans-serif;
            --font-brand: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", sans-serif;
            --shadow-soft: 0 12px 24px -22px rgba(15, 23, 42, 0.3);
            --shadow-card-hover: 0 18px 30px -24px rgba(15, 23, 42, 0.4);
            --focus-ring: 0 0 0 4px rgba(0, 113, 227, 0.14);
            --glass-sat: 200%;
            --glass-blur-sm: 12px;
            --glass-blur-md: 18px;
            --glass-blur-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        body {
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background:
                radial-gradient(1300px 700px at -10% -20%, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.4) 55%, transparent 70%),
                radial-gradient(1100px 700px at 120% 110%, rgba(220, 231, 246, 0.6), rgba(225, 236, 249, 0.14) 55%, transparent 70%),
                linear-gradient(165deg, var(--bg-base) 0%, var(--bg-overlay) 100%);
        }

        .bg-shapes {
            display: block;
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(96px);
            opacity: 0.38;
            animation: float 18s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            width: 420px;
            height: 420px;
            top: -140px;
            left: -120px;
            background: rgba(255, 255, 255, 0.92);
        }

        .blob-2 {
            width: 380px;
            height: 380px;
            bottom: -120px;
            right: -80px;
            animation-delay: -6s;
            background: rgba(212, 227, 246, 0.78);
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(70px, 44px) scale(1.08);
            }
        }

        .extract-bar {
            display: flex;
            gap: 10px;
            width: 100%;
            margin: 0;
        }

        .extract-bar input {
            flex: 1;
            padding: 12px 17px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.54));
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62), 0 8px 18px -18px rgba(13, 24, 43, 0.46);
            transition: border-color 0.24s, box-shadow 0.24s, transform 0.24s;
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
        }

        .extract-bar input:focus {
            border-color: rgba(0, 113, 227, 0.38);
            box-shadow: var(--focus-ring), inset 0 1px 0 rgba(255, 255, 255, 0.74);
        }

        .extract-bar input::placeholder {
            color: #8b94a6;
        }

        .extract-btn {
            padding: 11px 19px;
            border: 1px solid #d1d9e4;
            border-radius: 999px;
            background: #f3f6fa;
            color: #2a3342;
            font-size: 0.84rem;
            font-weight: 650;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
            white-space: nowrap;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            position: relative;
        }

        .extract-btn:hover:not(:disabled) {
            background: #e9eef5;
            border-color: #c8d1df;
        }

        .extract-btn:active:not(:disabled) {
            background: #e2e8f1;
            border-color: #c1cbdb;
        }

        .extract-btn:disabled {
            opacity: 0.72;
            cursor: not-allowed;
        }

        .extract-btn.is-loading {
            padding-left: 34px;
        }

        .extract-btn.is-loading::before {
            content: '';
            position: absolute;
            left: 13px;
            top: 50%;
            width: 12px;
            height: 12px;
            border: 2px solid #9aabc1;
            border-top-color: transparent;
            border-radius: 50%;
            transform: translateY(-50%);
            animation: btn-spin 0.75s linear infinite;
        }

        @keyframes btn-spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.78);
            font-size: 0.88rem;
            font-weight: 600;
            z-index: 200;
            transform: translateX(120%);
            transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
            max-width: 420px;
            color: #293043;
            box-shadow: 0 20px 34px -24px rgba(15, 23, 42, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.7);
            backdrop-filter: saturate(185%) blur(18px);
            -webkit-backdrop-filter: saturate(185%) blur(18px);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: rgba(225, 247, 236, 0.88);
            border: 1px solid rgba(142, 218, 179, 0.84);
            color: #1c7a51;
        }

        .toast.deleted {
            background: rgba(221, 245, 233, 0.9);
            border: 1px solid rgba(126, 206, 165, 0.84);
            color: #146843;
        }

        .toast.error {
            background: rgba(255, 236, 236, 0.9);
            border: 1px solid rgba(246, 180, 180, 0.82);
            color: #9a2f2f;
        }

        .command-overlay {
            position: fixed;
            inset: 0;
            background: rgba(19, 24, 34, 0.28);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 120;
        }

        .command-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .command-panel {
            width: min(680px, 100%);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.56));
            border: 1px solid rgba(255, 255, 255, 0.88);
            border-radius: 20px;
            box-shadow: 0 30px 56px -34px rgba(15, 23, 42, 0.62), inset 0 1px 0 rgba(255, 255, 255, 0.86);
            padding: 14px;
            backdrop-filter: saturate(220%) blur(22px);
            -webkit-backdrop-filter: saturate(220%) blur(22px);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(8px) scale(0.985);
            transition: transform 0.24s cubic-bezier(0.22, 0.9, 0.3, 1), opacity 0.2s ease;
            will-change: transform, opacity;
        }

        .command-overlay.active .command-panel {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .command-panel::before {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 19px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.05) 62%, rgba(255, 255, 255, 0.2));
            pointer-events: none;
        }

        .command-title {
            font-size: 0.82rem;
            color: #69758a;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
            position: relative;
            z-index: 1;
        }

        .command-hint {
            margin-top: 10px;
            font-size: 0.76rem;
            color: #8b94a6;
            position: relative;
            z-index: 1;
        }

        .stats {
            color: #606a7c;
            font-size: 0.74rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.48));
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.86);
            white-space: nowrap;
            justify-self: end;
            box-shadow: 0 10px 18px -18px rgba(15, 23, 42, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.72);
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
        }

        main {
            width: min(1400px, 92%);
            margin: 0 auto;
            padding: 1.6rem 0 2.6rem;
            min-height: auto;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.4rem;
        }

        .board-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 1.15rem;
        }

        @media (min-width: 1024px) {
            main {
                width: min(1440px, 95%);
            }

            .board-toolbar,
            .grid {
                width: min(1340px, 100%);
                margin-left: auto;
                margin-right: auto;
            }

            .grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        .toolbar-filters {
            display: flex;
            align-items: center;
            gap: 10px;
            width: min(700px, 100%);
            justify-content: flex-end;
        }

        .view-switch {
            display: inline-flex;
            align-items: center;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.86);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.44));
            gap: 4px;
            box-shadow: 0 14px 24px -22px rgba(15, 23, 42, 0.46), inset 0 1px 0 rgba(255, 255, 255, 0.7);
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
        }

        .view-btn {
            border: none;
            background: transparent;
            color: #7a8497;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.81rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s, background 0.2s, box-shadow 0.2s;
        }

        .view-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.55);
        }

        .view-btn.active {
            color: #1f232b;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 18px -18px rgba(15, 23, 42, 0.62), inset 0 1px 0 rgba(255, 255, 255, 0.84);
        }

        .delete-btn {
            background: rgba(255, 255, 255, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.7);
            color: #7d879a;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.9;
            transition: all 0.22s;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .delete-btn:hover {
            opacity: 1;
            transform: translateY(-1px);
            color: var(--error);
            background: rgba(255, 245, 245, 0.95);
            border-color: rgba(246, 199, 199, 0.9);
            box-shadow: 0 14px 20px -18px rgba(204, 59, 59, 0.58);
        }

        .filter-input {
            width: min(460px, 100%);
            max-width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.9);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.5));
            color: var(--text-primary);
            border-radius: 999px;
            font-size: 0.83rem;
            padding: 11px 17px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66), 0 8px 18px -18px rgba(15, 23, 42, 0.52);
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
        }

        .filter-input:focus {
            border-color: rgba(0, 113, 227, 0.4);
            box-shadow: var(--focus-ring), inset 0 1px 0 rgba(255, 255, 255, 0.76);
        }

        .filter-input::placeholder {
            color: #8b94a6;
        }

        .platform-select {
            width: 116px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.5));
            color: var(--text-primary);
            border-radius: 999px;
            font-size: 0.83rem;
            padding: 10px 30px 10px 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66), 0 8px 18px -18px rgba(15, 23, 42, 0.52);
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-sm));
            appearance: none;
            -webkit-appearance: none;
            background-image:
                linear-gradient(45deg, transparent 50%, #8b94a6 50%),
                linear-gradient(135deg, #8b94a6 50%, transparent 50%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.5));
            background-position:
                calc(100% - 16px) calc(50% - 1px),
                calc(100% - 11px) calc(50% - 1px),
                0 0;
            background-size:
                6px 6px,
                6px 6px,
                100% 100%;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        .platform-select:focus {
            border-color: rgba(0, 113, 227, 0.4);
            box-shadow: var(--focus-ring), inset 0 1px 0 rgba(255, 255, 255, 0.76);
        }

        .card {
            background: linear-gradient(165deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.42));
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 1.34rem;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.3s;
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-md));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-md));
            display: flex;
            flex-direction: column;
            gap: 0.86rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.76);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.08) 38%, transparent 72%);
            pointer-events: none;
            opacity: 0.82;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-card-hover), inset 0 1px 0 rgba(255, 255, 255, 0.88);
            border-color: rgba(255, 255, 255, 0.9);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .title {
            font-weight: 650;
            font-size: 1.08rem;
            line-height: 1.42;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .status {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(227, 246, 236, 0.74);
            color: #2a7e5a;
            border: 1px solid rgba(156, 215, 186, 0.7);
            white-space: nowrap;
        }

        .preview {
            color: var(--text-secondary);
            font-size: 0.89rem;
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid rgba(133, 148, 173, 0.12);
            padding-top: 0.84rem;
        }

        .meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: #788295;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .inline-icon {
            width: 13px;
            height: 13px;
            color: #8792a8;
            flex-shrink: 0;
        }

        .source-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 650;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .source-link:hover {
            color: var(--accent-hover);
        }

        .list-view {
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.84);
            border-radius: 22px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.46));
            box-shadow: 0 14px 24px -22px rgba(15, 23, 42, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.66);
            backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-md));
            -webkit-backdrop-filter: saturate(var(--glass-sat)) blur(var(--glass-blur-md));
        }

        .list-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            padding: 13px 16px;
            border-bottom: 1px solid rgba(133, 148, 173, 0.18);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .list-row:hover {
            background: rgba(255, 255, 255, 0.42);
            transform: translateY(0);
        }

        .list-main {
            display: flex;
            align-items: flex-start;
            gap: 11px;
            min-width: 0;
        }

        .list-thumb {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            background: rgba(248, 250, 253, 0.95);
            overflow: hidden;
            box-shadow: 0 12px 18px -20px rgba(15, 23, 42, 0.45);
        }

        .list-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .list-content {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .list-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .list-title {
            font-size: 0.94rem;
            font-weight: 620;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-preview {
            font-size: 0.82rem;
            color: #7a8598;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #7a8598;
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.76);
            border-radius: 20px;
            box-shadow: 0 12px 22px -20px rgba(15, 23, 42, 0.32);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(230, 235, 243, 0.75), rgba(243, 246, 250, 0.95), rgba(230, 235, 243, 0.75));
            background-size: 180% 100%;
            animation: pulse 1.3s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes pulse {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 31, 41, 0.24);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #ffffff;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 30px;
            border: 1px solid rgba(224, 230, 238, 0.95);
            box-shadow: 0 36px 56px -34px rgba(15, 23, 42, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.82);
            display: flex;
            flex-direction: column;
            transform: translateY(18px) scale(0.96);
            transition: all 0.3s cubic-bezier(0.2, 0.75, 0.2, 1);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(133, 148, 173, 0.18);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title {
            font-size: 1.24rem;
            font-weight: 650;
            line-height: 1.38;
            padding-right: 2rem;
            letter-spacing: -0.01em;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.74);
            color: #7b8496;
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s, background 0.2s;
            width: 32px;
            height: 32px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #1e2531;
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            color: #596378;
            font-size: 0.95rem;
            line-height: 1.64;
            white-space: pre-wrap;
        }

        .card-media {
            width: 100%;
            height: 164px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            background: rgba(240, 244, 250, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.82);
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-media .media-badge {
            position: absolute;
            bottom: 9px;
            right: 9px;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.69rem;
            font-weight: 600;
            background: rgba(28, 33, 42, 0.58);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #fff;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal-media {
            margin-bottom: 1rem;
        }

        .modal-media .media-gallery {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-snap-type: x mandatory;
        }

        .modal-media .media-gallery img {
            max-height: 360px;
            max-width: 100%;
            border-radius: 12px;
            object-fit: contain;
            scroll-snap-align: start;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.68);
            background: rgba(246, 249, 252, 0.86);
        }

        .modal-media video {
            width: 100%;
            max-height: 400px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.68);
            background: #000;
        }

        .modal-media .gallery-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #778398;
            margin-top: 6px;
        }

        /* Article HTML Content (inline images, reserved for canonical_html rich text) */
        .article-html {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.8;
        }

        .article-html img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 1rem 0;
            display: block;
        }

        .article-html p {
            margin-bottom: 1rem;
        }

        .article-html h1,
        .article-html h2,
        .article-html h3,
        .article-html h4,
        .article-html h5,
        .article-html h6 {
            color: var(--text-primary);
            margin: 1.5rem 0 0.75rem;
        }

        .article-html a {
            color: var(--accent);
            text-decoration: none;
        }

        .article-html a:hover {
            text-decoration: underline;
        }

        .article-html blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 1rem 0;
            opacity: 0.85;
        }

        .article-html pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        .article-html table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .article-html th,
        .article-html td {
            padding: 8px 12px;
            border: 1px solid var(--card-border);
        }

        .article-html figure {
            margin: 1rem 0;
            text-align: center;
        }

        .article-html figcaption {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* 通用网站 / 微信：行内图片 */
        .inline-img-wrap {
            margin: 1rem 0;
            text-align: center;
        }

        .inline-img {
            max-width: 100%;
            max-height: 480px;
            border-radius: 10px;
            object-fit: contain;
            border: 1px solid rgba(200, 210, 225, 0.5);
            background: rgba(246, 249, 252, 0.86);
        }

        .content-para {
            margin: 0 0 1.2rem 0;
            line-height: 1.7;
            font-size: 1.05rem;
            color: #334155;
            word-wrap: break-word;
        }

        @media (max-width: 860px) {
            main {
                padding: 1.4rem 4%;
                min-height: auto;
            }

            .toolbar-left {
                justify-content: space-between;
            }

            .board-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-filters {
                width: 100%;
                justify-content: stretch;
            }

            .filter-input {
                width: 100%;
            }

            .platform-select {
                width: 112px;
                flex-shrink: 0;
            }

            .command-overlay {
                padding: 12px;
            }

            .command-panel {
                border-radius: 14px;
                padding: 12px;
            }

            .list-row {
                grid-template-columns: minmax(0, 1fr);
                gap: 8px;
            }

            .list-meta {
                justify-content: space-between;
                gap: 8px;
                font-size: 0.75rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="bg-shapes">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="command-overlay" id="commandOverlay">
        <div class="command-panel" role="dialog" aria-modal="true" aria-label="添加链接">
            <div class="command-title">添加链接</div>
            <div class="extract-bar">
                <input type="text" id="urlInput" placeholder="粘贴链接后回车…" />
                <button class="extract-btn" id="extractBtn" onclick="extractURL()">添加</button>
            </div>
            <div class="command-hint">快捷键：⌘K / Ctrl+K 打开，Esc 关闭</div>
        </div>
    </div>

    <main>
        <div class="board-toolbar">
            <div class="toolbar-left">
                <div class="view-switch">
                    <button class="view-btn active" id="galleryViewBtn" type="button">画廊</button>
                    <button class="view-btn" id="listViewBtn" type="button">列表</button>
                </div>
                <div class="stats" id="stats">加载中...</div>
            </div>
            <div class="toolbar-filters">
                <input id="filterInput" class="filter-input" type="text" placeholder="筛选" />
                <select id="platformFilter" class="platform-select" aria-label="筛选平台">
                    <option value="all">全部</option>
                    <option value="douyin">抖音</option>
                    <option value="xiaohongshu">小红书</option>
                    <option value="generic">网站</option>
                    <option value="x">X</option>
                </select>
            </div>
        </div>
        <div class="grid" id="grid">
            <!-- Skeletons -->
            <div class="card">
                <div class="skeleton" style="height:24px;width:80%;margin-bottom:1rem;"></div>
                <div class="skeleton" style="height:60px;width:100%;margin-bottom:1rem;"></div>
                <div class="skeleton" style="height:20px;width:40%;"></div>
            </div>
            <div class="card">
                <div class="skeleton" style="height:24px;width:90%;margin-bottom:1rem;"></div>
                <div class="skeleton" style="height:60px;width:100%;margin-bottom:1rem;"></div>
                <div class="skeleton" style="height:20px;width:50%;"></div>
            </div>
            <div class="card">
                <div class="skeleton" style="height:24px;width:70%;margin-bottom:1rem;"></div>
                <div class="skeleton" style="height:60px;width:100%;margin-bottom:1rem;"></div>
                <div class="skeleton" style="height:20px;width:30%;"></div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">标题</h2>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            <div class="modal-body" id="modalContent">内容加载中...</div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const stats = document.getElementById('stats');
        const modalOverlay = document.getElementById('modalOverlay');
        const commandOverlay = document.getElementById('commandOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const closeModal = document.getElementById('closeModal');
        const urlInput = document.getElementById('urlInput');
        const extractBtn = document.getElementById('extractBtn');
        const toast = document.getElementById('toast');
        const filterInput = document.getElementById('filterInput');
        const platformFilter = document.getElementById('platformFilter');
        const galleryViewBtn = document.getElementById('galleryViewBtn');
        const listViewBtn = document.getElementById('listViewBtn');
        const iconCalendar = '<svg class="inline-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 3v3M17 3v3M4 9h16M6.5 5h11A1.5 1.5 0 0 1 19 6.5v11A1.5 1.5 0 0 1 17.5 19h-11A1.5 1.5 0 0 1 5 17.5v-11A1.5 1.5 0 0 1 6.5 5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        const iconText = '<svg class="inline-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 7.5h14M5 12h14M5 16.5h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

        let itemsData = [];
        let currentView = 'gallery';
        let filteredEntries = [];

        function openCommandPalette() {
            commandOverlay.classList.add('active');
            setTimeout(() => urlInput.focus(), 10);
        }

        function closeCommandPalette() {
            commandOverlay.classList.remove('active');
        }

        function showToast(msg, type) {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        async function extractURL() {
            const url = urlInput.value.trim();
            if (!url) { showToast('请输入链接', 'error'); return; }
            if (!url.startsWith('http')) { showToast('请输入有效的 http/https 链接', 'error'); return; }

            extractBtn.disabled = true;
            extractBtn.classList.add('is-loading');
            extractBtn.textContent = '处理中…';
            try {
                const resp = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await resp.json();
                if (resp.ok) {
                    const mediaInfo = data.media_count > 0 ? `，${data.media_count} 个媒体` : '';
                    showToast(`收录成功：${data.title} (${data.text_length} 字${mediaInfo}，平台：${data.platform})`, 'success');
                    urlInput.value = '';
                    closeCommandPalette();
                    fetchItems();
                } else {
                    showToast(`失败：${data.detail || '未知错误'}`, 'error');
                }
            } catch (e) {
                showToast('网络错误：' + e.message, 'error');
            } finally {
                extractBtn.disabled = false;
                extractBtn.classList.remove('is-loading');
                extractBtn.textContent = '添加';
            }
        }

        urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') extractURL(); });
        commandOverlay.addEventListener('click', e => {
            if (e.target === commandOverlay) closeCommandPalette();
        });
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if ((e.metaKey || e.ctrlKey) && key === 'k') {
                e.preventDefault();
                if (commandOverlay.classList.contains('active')) closeCommandPalette();
                else openCommandPalette();
            }
            if (e.key === 'Escape' && commandOverlay.classList.contains('active')) {
                closeCommandPalette();
            }
        });

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function getItemThumbnail(item) {
            if (!item.media || item.media.length === 0) return null;
            const images = item.media.filter(m => m.type === 'image');
            const covers = item.media.filter(m => m.type === 'cover');
            return images[0] || covers[0] || null;
        }

        function normalizePlatform(platform) {
            const value = (platform || '').toLowerCase();
            if (value.includes('douyin') || value.includes('抖音') || value.includes('tiktok')) return 'douyin';
            if (value.includes('xiaohongshu') || value.includes('小红书') || value.includes('rednote') || value === 'xhs') return 'xiaohongshu';
            if (value === 'x' || value.includes('twitter')) return 'x';
            if (value === 'general' || value === 'web' || value === 'site') return 'general';
            return value;
        }

        function applyFilter() {
            const keyword = filterInput.value.trim().toLowerCase();
            const selectedPlatform = platformFilter.value;
            filteredEntries = itemsData
                .map((item, index) => ({ item, index }))
                .filter(({ item }) => {
                    const platform = normalizePlatform(item.platform || '');
                    const matchPlatform = selectedPlatform === 'all' || platform === selectedPlatform;
                    if (!matchPlatform) return false;
                    if (!keyword) return true;
                    const title = (item.title || '').toLowerCase();
                    const text = (item.canonical_text || '').toLowerCase();
                    const rawPlatform = (item.platform || '').toLowerCase();
                    return title.includes(keyword) || text.includes(keyword) || rawPlatform.includes(keyword);
                });

            const hasKeyword = !!keyword;
            const hasPlatformFilter = selectedPlatform !== 'all';
            const countText = (hasKeyword || hasPlatformFilter)
                ? `已收录 ${itemsData.length} 篇 · 显示 ${filteredEntries.length} 篇`
                : `已收录 ${itemsData.length} 篇文章`;
            stats.innerText = countText;

            renderItems(filteredEntries);
        }

        async function fetchItems() {
            try {
                const response = await fetch('/api/items?limit=50');
                if (!response.ok) throw new Error('API Error');
                itemsData = await response.json();
                applyFilter();
            } catch (error) {
                stats.innerText = '加载失败';
                grid.className = 'grid';
                grid.innerHTML = '<div class="empty-state">无法连接到后端 API</div>';
            }
        }

        function renderItems(entries) {
            if (entries.length === 0) {
                grid.className = currentView === 'gallery' ? 'grid' : 'list-view';
                grid.innerHTML = '<div class="empty-state">暂无收录内容，请在 App 中添加。</div>';
                return;
            }

            if (currentView === 'list') {
                grid.className = 'list-view';
                grid.innerHTML = entries.map(({ item, index }) => {
                    const textPreview = item.canonical_text ? item.canonical_text.substring(0, 120) + '...' : '无正文内容';
                    const length = item.canonical_text ? item.canonical_text.length : 0;
                    const thumb = getItemThumbnail(item);
                    const thumbHtml = thumb
                        ? `<div class="list-thumb"><img src="${thumb.url}" loading="lazy" alt=""></div>`
                        : `<div class="list-thumb"></div>`;
                    return `
                        <div class="list-row" onclick="openModal(${index})">
                            <div class="list-main">
                                ${thumbHtml}
                                <div class="list-content">
                                    <div class="list-title-row">
                                        <div class="list-title">${item.title || '无标题'}</div>
                                        <span class="status">解析成功</span>
                                    </div>
                                    <div class="list-preview">${textPreview}</div>
                                </div>
                            </div>
                            <div class="list-meta">
                                <span>${item.platform || 'web'}</span>
                                <span>${formatDate(item.created_at)}</span>
                                <span>${length} 字</span>
                                <div style="display: flex; gap: 12px; align-items: center;">
                                    <button onclick="deleteItem('${item.id}', event)" class="delete-btn" title="删除">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                    </button>
                                    <a href="${item.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">原文 ↗</a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                return;
            }

            grid.className = 'grid';
            grid.innerHTML = entries.map(({ item, index }) => {
                const textPreview = item.canonical_text ? item.canonical_text.substring(0, 150) + '...' : '无正文内容';
                const length = item.canonical_text ? item.canonical_text.length : 0;

                // 生成媒体缩略图
                let thumbnailHtml = '';
                if (item.media && item.media.length > 0) {
                    const images = item.media.filter(m => m.type === 'image');
                    const covers = item.media.filter(m => m.type === 'cover');
                    const videos = item.media.filter(m => m.type === 'video');
                    const thumb = images[0] || covers[0];
                    if (thumb) {
                        let badge = '';
                        if (images.length > 1) badge = `<span class="media-badge">${images.length} 张图片</span>`;
                        else if (videos.length > 0) badge = `<span class="media-badge">▶ 视频</span>`;
                        thumbnailHtml = `<div class="card-media"><img src="${thumb.url}" loading="lazy" alt="">${badge}</div>`;
                    }
                }

                return `
                    <div class="card" onclick="openModal(${index})">
                        ${thumbnailHtml}
                        <div class="card-header">
                            <h3 class="title">${item.title || '无标题'}</h3>
                            <span class="status">解析成功</span>
                        </div>
                        <div class="preview">${textPreview}</div>
                        <div class="footer">
                            <div class="meta">
                                <span class="meta-item">${iconCalendar}${formatDate(item.created_at)}</span>
                                <span class="meta-item">${iconText}${length} 字</span>
                            </div>
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <button onclick="deleteItem('${item.id}', event)" class="delete-btn" title="删除">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                </button>
                                <a href="${item.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">
                                    原文 ↗
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setView(view) {
            currentView = view;
            galleryViewBtn.classList.toggle('active', view === 'gallery');
            listViewBtn.classList.toggle('active', view === 'list');
            renderItems(filteredEntries);
        }

        filterInput.addEventListener('input', applyFilter);
        platformFilter.addEventListener('change', applyFilter);
        galleryViewBtn.addEventListener('click', () => setView('gallery'));
        listViewBtn.addEventListener('click', () => setView('list'));

        async function deleteItem(id, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这条内容吗？删除后不可恢复。')) return;

            try {
                const response = await fetch(`/api/items/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('已删除', 'deleted');
                    fetchItems();
                } else {
                    const data = await response.json();
                    showToast('删除失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('网络错误：' + error.message, 'error');
            }
        }

        function openModal(index) {
            const item = itemsData[index];
            modalTitle.innerText = item.title || '无标题';

            const platform = normalizePlatform(item.platform || '');
            const isCarouselPlatform = platform === 'xiaohongshu' || platform === 'douyin';
            const videos = (item.media || []).filter(m => m.type === 'video');

            if (isCarouselPlatform) {
                // ── XHS / 抖音：图片轮播在顶部 ──────────────────────────────
                const images = (item.media || []).filter(m => m.type === 'image').sort((a, b) => a.display_order - b.display_order);
                let html = '';
                if (videos.length > 0) {
                    const cover = (item.media || []).find(m => m.type === 'cover');
                    html += `<div class="modal-media"><video controls preload="metadata" poster="${cover ? cover.url : ''}"><source src="${videos[0].url}" type="video/mp4"></video></div>`;
                }
                if (images.length > 0) {
                    html += `<div class="modal-media"><div class="media-gallery">${images.map(img => `<img src="${img.url}" alt="">`).join('')}</div>${images.length > 1 ? '<div class="gallery-hint">← 左右滑动查看更多图片 →</div>' : ''}</div>`;
                }
                html += `<div style="white-space:pre-wrap">${item.canonical_text || '暂无内容'}</div>`;
                modalContent.innerHTML = html;

            } else if (item.canonical_html) {
                // ── 模式 1: 通用网页 — 用 canonical_html 渲染（排版更佳，保留原生格式和图片位置）────────
                let html = '';
                if (videos.length > 0) {
                    html += `<div class="modal-media"><video controls preload="metadata"><source src="${videos[0].url}" type="video/mp4"></video></div>`;
                }
                html += `<div class="article-html" style="margin-top: 0;">${item.canonical_html}</div>`;
                modalContent.innerHTML = html;

            } else if (item.content_blocks_json) {
                // ── 模式 2: 通用网页 — 用 DOM 遍历块，图文顺序完全还原 (回退 fallback) ─────────────
                let blocks;
                try { blocks = JSON.parse(item.content_blocks_json); } catch (e) { blocks = null; }

                if (blocks && blocks.length > 0) {
                    let html = '';
                    if (videos.length > 0) {
                        html += `<div class="modal-media"><video controls preload="metadata"><source src="${videos[0].url}" type="video/mp4"></video></div>`;
                    }
                    blocks.forEach(block => {
                        if (block.type === 'text' && block.content) {
                            html += `<p class="content-para">${block.content.replace(/\n/g, '<br>')}</p>`;
                        } else if (block.type === 'image' && block.url) {
                            html += `<div class="inline-img-wrap"><img src="${block.url}" alt="" class="inline-img"></div>`;
                        }
                    });
                    modalContent.innerHTML = html;
                } else {
                    // blocks parsed but empty — show text only
                    modalContent.innerHTML = `<div style="white-space:pre-wrap">${item.canonical_text || '暂无内容'}</div>`;
                }

            } else {
                // ── 旧记录没有 content_blocks_json：文字在前，图片在后 ───────
                const images = (item.media || []).filter(m => m.type === 'image').sort((a, b) => a.display_order - b.display_order);
                let html = '';
                if (videos.length > 0) {
                    html += `<div class="modal-media"><video controls preload="metadata"><source src="${videos[0].url}" type="video/mp4"></video></div>`;
                }
                html += `<div style="white-space:pre-wrap;margin-bottom:${images.length > 0 ? '1rem' : '0'}">${item.canonical_text || '暂无内容'}</div>`;
                if (images.length > 0) {
                    html += `<div class="modal-media"><div class="media-gallery">${images.map(img => `<img src="${img.url}" alt="">`).join('')}</div>${images.length > 1 ? '<div class="gallery-hint">← 左右滑动查看图片 →</div>' : ''}</div>`;
                }
                modalContent.innerHTML = html;
            }

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        closeModal.onclick = () => {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        };

        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModal.onclick();
        };

        // Fetch on load
        fetchItems();
    </script>
</body>

</html>
