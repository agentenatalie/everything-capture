        function setStatsMessage(message) {
            stats.classList.add('is-plain');
            stats.textContent = message;
        }

        function setStatsSummary(total, visible, returned, hasFilter) {
            const folderLabel = getCurrentFolderLabel();
            const selectionCount = selectedItemIds.size;
            stats.classList.remove('is-plain');
            if (selectionMode) {
                stats.innerHTML = `已选择 <strong>${selectionCount}</strong> 条 <span class="stats-secondary">${folderLabel}</span>`;
                return;
            }
            if (hasFilter) {
                if (visible > returned) {
                    stats.innerHTML = `已收录 <strong>${total}</strong> 篇 <span class="stats-secondary">${folderLabel} · 匹配 <strong>${visible}</strong> 篇，当前显示最新 <strong>${returned}</strong> 篇</span>`;
                    return;
                }
                stats.innerHTML = `已收录 <strong>${total}</strong> 篇 <span class="stats-secondary">${folderLabel} · 显示 <strong>${visible}</strong> 篇</span>`;
                return;
            }
            if (total > returned) {
                stats.innerHTML = `已收录 <strong>${total}</strong> 篇 <span class="stats-secondary">${folderLabel} · 当前显示最新 <strong>${returned}</strong> 篇</span>`;
                return;
            }
            stats.innerHTML = `已收录 <strong>${total}</strong> 篇内容 <span class="stats-secondary">${folderLabel}</span>`;
        }

        function folderIconSvg() {
            return '<svg class="folder-item-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3.75 6.75A2.25 2.25 0 0 1 6 4.5h3.2a2.25 2.25 0 0 1 1.59.66l1.05 1.05c.28.28.66.44 1.06.44H18A2.25 2.25 0 0 1 20.25 8.9v7.6A2.25 2.25 0 0 1 18 18.75H6A2.25 2.25 0 0 1 3.75 16.5v-9.75Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>';
        }

        function checkSvg() {
            return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12 4.2 4.2L19 6.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        }

        function getCurrentFolderLabel() {
            if (currentFolderScope === 'unfiled') return '未分类';
            if (currentFolderScope === 'folder') {
                const folder = foldersData.find((entry) => entry.id === currentFolderId);
                return folder ? `文件夹：${folder.name}` : '文件夹';
            }
            return '全部内容';
        }

        function getCurrentFolderName(item) {
            return item?.folder_name ? item.folder_name : '';
        }

        function updateSelectionUI() {
            selectionModeBtn.textContent = selectionMode ? '取消选择' : '选择';
            bulkMoveBtn.hidden = !selectionMode;
            bulkMoveBtn.disabled = selectedItemIds.size === 0;
            bulkMoveBtn.textContent = selectedItemIds.size > 0 ? `加入文件夹 (${selectedItemIds.size})` : '加入文件夹';
        }

        function clearSelection() {
            selectedItemIds = new Set();
            updateSelectionUI();
        }

        function setSelectionMode(nextValue) {
            selectionMode = typeof nextValue === 'boolean' ? nextValue : !selectionMode;
            if (!selectionMode) {
                clearSelection();
            } else {
                updateSelectionUI();
            }
            setStatsSummary(
                latestTotalCount || itemsData.length,
                latestVisibleCount || itemsData.length,
                latestReturnedCount || itemsData.length,
                !!filterInput.value.trim() || platformFilter.value !== 'all' || currentFolderScope !== 'all'
            );
            renderItems(filteredEntries);
        }

        function toggleItemSelection(itemId) {
            if (!selectionMode) return;
            if (selectedItemIds.has(itemId)) selectedItemIds.delete(itemId);
            else selectedItemIds.add(itemId);
            updateSelectionUI();
            setStatsSummary(
                latestTotalCount || itemsData.length,
                latestVisibleCount || itemsData.length,
                latestReturnedCount || itemsData.length,
                !!filterInput.value.trim() || platformFilter.value !== 'all' || currentFolderScope !== 'all'
            );
            renderItems(filteredEntries);
        }

        function handleItemPrimaryAction(itemId) {
            if (selectionMode) {
                toggleItemSelection(itemId);
                return;
            }
            openModalById(itemId);
        }

        function renderSelectionIndicator(itemId) {
            if (!selectionMode) return '';
            const isSelected = selectedItemIds.has(itemId);
            return `<span class="select-indicator${isSelected ? ' is-selected' : ''}">${checkSvg()}</span>`;
        }

        function renderFolderTag(item) {
            if (!item.folder_name) return '';
            return `<span class="folder-tag">${folderIconSvg()}<span>${escapeHtml(item.folder_name)}</span></span>`;
        }

        function renderFolderActionButton(item) {
            return `
                <button onclick="openFolderPicker(['${item.id}'], ${item.folder_id ? `'${item.folder_id}'` : 'null'}, '加入文件夹'); event.stopPropagation();" class="folder-action-btn" title="加入文件夹">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3.75 6.75A2.25 2.25 0 0 1 6 4.5h3.2a2.25 2.25 0 0 1 1.59.66l1.05 1.05c.28.28.66.44 1.06.44H18A2.25 2.25 0 0 1 20.25 8.9v7.6A2.25 2.25 0 0 1 18 18.75H6A2.25 2.25 0 0 1 3.75 16.5v-9.75Z"></path>
                    </svg>
                </button>
            `;
        }

        function setActiveFolder(scope, folderId = null) {
            currentFolderScope = scope;
            currentFolderId = scope === 'folder' ? folderId : null;
            clearSelection();
            renderFolderNavigation();
            fetchItems();
        }

        function renderFolderNavItem(label, scope, count, folderId = null, options = {}) {
            const active = currentFolderScope === scope && (scope !== 'folder' || currentFolderId === folderId);
            const menuButton = options.menu
                ? `<button class="folder-item-menu" type="button" onclick="openFolderContextMenu('${folderId}', event)">···</button>`
                : '';
            const glyph = getFolderGlyph(label, scope);
            return `
                <div class="folder-item${active ? ' active' : ''}" role="button" tabindex="0" title="${escapeAttribute(label)}" onclick="setActiveFolder('${scope}', ${folderId ? `'${folderId}'` : 'null'})" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setActiveFolder('${scope}', ${folderId ? `'${folderId}'` : 'null'});}">
                    <span class="folder-item-glyph" aria-hidden="true">${escapeHtml(glyph)}</span>
                    <span class="folder-item-name">${escapeHtml(label)}</span>
                    <span class="folder-item-count">${count}</span>
                    ${menuButton}
                </div>
            `;
        }

        function updateSidebarState() {
            document.body.classList.toggle('sidebar-collapsed', !sidebarExpanded);
            const toggleLabel = sidebarExpanded ? '收起侧边栏' : '展开侧边栏';
            toggleSidebarBtn.title = toggleLabel;
            toggleSidebarBtn.setAttribute('aria-label', toggleLabel);
        }

        function getFolderGlyph(label, scope) {
            if (scope === 'all') return '全';
            if (scope === 'unfiled') return '未';
            const normalized = String(label || '').trim();
            if (!normalized) return '文';
            return normalized[0].toUpperCase();
        }

        function renderFolderNavigation() {
            const normalizedQuery = folderSearchQuery.trim().toLowerCase();
            const baseItems = [
                { label: '全部内容', scope: 'all', count: totalFolderCount },
                { label: '未分类', scope: 'unfiled', count: unfiledFolderCount },
            ];
            const userItems = foldersData.map((folder) => ({
                label: folder.name,
                scope: 'folder',
                count: folder.item_count || 0,
                id: folder.id,
            }));
            const visibleItems = [...baseItems, ...userItems].filter((entry) => {
                if (!normalizedQuery) return true;
                return String(entry.label || '').toLowerCase().includes(normalizedQuery);
            });

            folderList.innerHTML = visibleItems.length
                ? visibleItems.map((entry) => renderFolderNavItem(entry.label, entry.scope, entry.count, entry.id || null, { menu: entry.scope === 'folder' })).join('')
                : '<div class="folder-empty">没有匹配的文件夹</div>';

            const mobileItems = [
                { label: '全部', scope: 'all', count: totalFolderCount },
                { label: '未分类', scope: 'unfiled', count: unfiledFolderCount },
                ...foldersData.map((folder) => ({ label: folder.name, scope: 'folder', count: folder.item_count || 0, id: folder.id })),
            ];
            folderMobileStrip.innerHTML = mobileItems.map((item) => {
                const active = currentFolderScope === item.scope && (item.scope !== 'folder' || currentFolderId === item.id);
                const folderId = item.id ? `'${item.id}'` : 'null';
                return `<button class="folder-chip${active ? ' active' : ''}" type="button" onclick="setActiveFolder('${item.scope}', ${folderId})">${escapeHtml(item.label)} · ${item.count}</button>`;
            }).join('') + '<button class="folder-chip" type="button" onclick="openCreateFolderPrompt()">+ 新建</button>';
        }

        async function fetchFolders() {
            try {
                const response = await fetch('/api/folders');
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                foldersData = Array.isArray(data.folders) ? data.folders : [];
                totalFolderCount = Number(data.total_count || 0);
                unfiledFolderCount = Number(data.unfiled_count || 0);
                if (currentFolderScope === 'folder' && currentFolderId && !foldersData.some((folder) => folder.id === currentFolderId)) {
                    currentFolderScope = 'all';
                    currentFolderId = null;
                }
                renderFolderNavigation();
            } catch (error) {
                folderList.innerHTML = '<div class="folder-loading">文件夹加载失败</div>';
                folderMobileStrip.innerHTML = '';
            }
        }

        async function createFolder(name) {
            const trimmedName = String(name || '').trim();
            if (!trimmedName) return null;
            const response = await fetch('/api/folders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: trimmedName }),
            });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data.detail || '创建文件夹失败');
            }
            await fetchFolders();
            return data;
        }

        function openCreateFolderPrompt() {
            folderCreateInput.value = '';
            folderPickerTargetIds = [];
            folderPickerTitle.textContent = '新建文件夹';
            renderFolderPickerOptions(null);
            folderCreateConfirmBtn.textContent = '新建';
            folderPickerOverlay.classList.add('active');
            requestAnimationFrame(() => folderCreateInput.focus());
        }

        function openFolderPicker(itemIds = [], preferredFolderId = null, title = '加入文件夹') {
            folderPickerTargetIds = Array.isArray(itemIds) ? itemIds.filter(Boolean) : [];
            folderPickerTitle.textContent = title;
            folderCreateInput.value = '';
            folderCreateConfirmBtn.textContent = folderPickerTargetIds.length > 0 ? '新建并加入' : '新建';
            renderFolderPickerOptions(preferredFolderId);
            folderPickerOverlay.classList.add('active');
        }

        function closeFolderPickerDialog() {
            folderPickerOverlay.classList.remove('active');
            folderPickerTargetIds = [];
            folderCreateInput.value = '';
        }

        function renderFolderPickerOptions(preferredFolderId = null) {
            const selectedFolderId = preferredFolderId || (folderPickerTargetIds.length === 1
                ? itemsData.find((item) => item.id === folderPickerTargetIds[0])?.folder_id || null
                : null);
            const options = [
                { id: null, label: '未分类', count: unfiledFolderCount },
                ...foldersData.map((folder) => ({ id: folder.id, label: folder.name, count: folder.item_count || 0 })),
            ];
            folderPickerList.innerHTML = options.map((option) => {
                const active = option.id === selectedFolderId;
                const idValue = option.id ? `'${option.id}'` : 'null';
                return `
                    <button class="folder-picker-option${active ? ' active' : ''}" type="button" onclick="applyFolderSelection(${idValue})">
                        <span>${escapeHtml(option.label)}</span>
                        <span class="folder-picker-option-meta">${option.count} 条</span>
                    </button>
                `;
            }).join('');
        }

        async function applyFolderSelection(folderId) {
            try {
                if (folderPickerTargetIds.length > 1) {
                    const response = await fetch('/api/items/bulk-folder', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ item_ids: folderPickerTargetIds, folder_id: folderId }),
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || '批量归类失败');
                    showToast(`已整理 ${data.updated_count} 条内容`, 'success');
                } else if (folderPickerTargetIds.length === 1) {
                    const response = await fetch(`/api/items/${folderPickerTargetIds[0]}/folder`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ folder_id: folderId }),
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail || '归类失败');
                    showToast(data.folder_name ? `已加入 ${data.folder_name}` : '已移到未分类', 'success');
                } else {
                    closeFolderPickerDialog();
                    return;
                }
                closeFolderPickerDialog();
                clearSelection();
                await Promise.all([fetchFolders(), fetchItems()]);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function createFolderAndApply() {
            try {
                const folder = await createFolder(folderCreateInput.value);
                if (!folder) return;
                if (folderPickerTargetIds.length > 0) {
                    await applyFolderSelection(folder.id);
                } else {
                    showToast(`已创建文件夹：${folder.name}`, 'success');
                    closeFolderPickerDialog();
                    setActiveFolder('folder', folder.id);
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function openFolderContextMenu(folderId, event) {
            event.stopPropagation();
            const folder = foldersData.find((entry) => entry.id === folderId);
            if (!folder) return;
            folderContextMenu.innerHTML = `
                <button type="button" onclick="renameFolderPrompt('${folderId}')">重命名</button>
                <button type="button" class="is-danger" onclick="deleteFolderPrompt('${folderId}')">删除文件夹</button>
            `;
            folderContextMenu.style.top = `${event.clientY + 8}px`;
            folderContextMenu.style.left = `${Math.min(event.clientX - 120, window.innerWidth - 170)}px`;
            folderContextMenu.classList.add('show');
        }

        function closeFolderContextMenu() {
            folderContextMenu.classList.remove('show');
        }

        async function renameFolderPrompt(folderId) {
            closeFolderContextMenu();
            const folder = foldersData.find((entry) => entry.id === folderId);
            if (!folder) return;
            const nextName = window.prompt('重命名文件夹', folder.name);

            try {

                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nextName }),
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || '重命名失败');

                    setStatsSummary(
                        latestTotalCount || itemsData.length,
                        latestVisibleCount || itemsData.length,
                        latestReturnedCount || itemsData.length,

                    );
                }

                showToast(error.message, 'error');

        async function deleteFolderPrompt(folderId) {
            closeFolderContextMenu();
            const folder = foldersData.find((entry) => entry.id === folderId);
            if (!folder) return;
            if (!window.confirm(`删除文件夹“${folder.name}”？其中内容会回到未分类。`)) return;
            try {
                const response = await fetch(`/api/folders/${folderId}`, { method: 'DELETE' });
                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.detail || '删除文件夹失败');
                }
                showToast('文件夹已删除', 'deleted');
                if (currentFolderId === folderId) {
                    currentFolderScope = 'all';
                    currentFolderId = null;
                }
                await Promise.all([fetchFolders(), fetchItems()]);
            } catch (error) {
                showToast(error.message, 'error');
            }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replaceAll('`', '&#96;');
        }

        function truncateText(value, maxLength) {
            if (!value) return '';
            return value.length > maxLength ? `${value.slice(0, maxLength)}…` : value;
        }

        function extractFirstHttpUrl(value) {
            if (!value) return null;
            const match = String(value).match(/https?:\/\/[^\s<>"'`]+/i);
            if (!match) return null;

            const candidate = match[0].replace(/[)\]}>.,!?;:'"。，！？；：]+$/u, '');
            try {
                const parsed = new URL(candidate);
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                    return candidate;
                }
            } catch (error) {
                return null;
            }
            return null;
        }

        function isLikelyUrl(value) {
            if (!value) return false;
            try {
                const candidate = new URL(value);
                return candidate.protocol === 'http:' || candidate.protocol === 'https:';
            } catch (error) {
                return false;
            }
        }

        function resolveCommandUrl(value) {
            const trimmedValue = String(value || '').trim();
            if (!trimmedValue) return null;
            if (isLikelyUrl(trimmedValue)) return trimmedValue;
            return extractFirstHttpUrl(trimmedValue);
        }

        function setCommandActionsVisible(visible) {
            extractBtn.hidden = !visible;
            clipboardBtn.hidden = !visible;
        }

        function getActiveSearchParams(limit = 200, qOverride = null) {
            const params = new URLSearchParams();
            const keyword = (qOverride ?? filterInput.value).trim();
            const platform = platformFilter.value;
            params.set('limit', String(limit));
            if (keyword) params.set('q', keyword);
            if (platform !== 'all') params.set('platform', platform);
            if (currentFolderScope === 'unfiled') {
                params.set('folder_scope', 'unfiled');
            } else if (currentFolderScope === 'folder' && currentFolderId) {
                params.set('folder_id', currentFolderId);
            }
            return params;
        }

        function scheduleLibrarySearch() {
            window.clearTimeout(librarySearchTimer);
            librarySearchTimer = window.setTimeout(() => {
                fetchItems();
            }, 180);
        }

        function scheduleCommandSearch(query) {
            window.clearTimeout(commandSearchTimer);
            commandSearchTimer = window.setTimeout(() => {
                fetchCommandResults(query);
            }, 150);
        }

        function clearCommandResults() {
            commandRequestId += 1;
            commandSearchResults = [];
            commandResults.innerHTML = '';
        }

        function uniquePreserveOrder(values) {
            const seen = new Set();
            return values.filter((value) => {
                const normalized = String(value || '').trim();
                if (!normalized || seen.has(normalized)) return false;
                seen.add(normalized);
                return true;
            });
        }

        function getItemImages(item) {
            return (item.media || [])
                .filter((media) => media.type === 'image' && media.url)
                .sort((a, b) => a.display_order - b.display_order);
        }

        function extractImageUrlsFromHtml(html) {
            return Array.from(
                String(html || '').matchAll(/<img[^>]+src=["']([^"']+)["'][^>]*>/gi),
                (match) => match[1]
            );
        }

        function hasSuspiciousRepeatedImages(imageUrls, mediaImageUrls) {
            const nonEmptyImageUrls = imageUrls.filter(Boolean);
            const uniqueInlineImages = uniquePreserveOrder(nonEmptyImageUrls);
            const uniqueMediaImages = uniquePreserveOrder(mediaImageUrls);
            return nonEmptyImageUrls.length > 1 && uniqueInlineImages.length === 1 && uniqueMediaImages.length > 1;
        }

        function parseContentBlocks(item) {
            if (!item.content_blocks_json) return null;
            try {
                const blocks = JSON.parse(item.content_blocks_json);
                return Array.isArray(blocks) ? blocks : null;
            } catch (error) {
                return null;
            }
        }

        function summarizeStructuredBlocks(blocks) {
            const types = new Set((blocks || []).map((block) => String(block?.type || '')).filter(Boolean));
            const mediaTypes = new Set(['image', 'video', 'cover']);
            return {
                hasText: (blocks || []).some((block) => {
                    const content = String(block?.content || block?.markdown || '').trim();
                    return (block?.type === 'text' || block?.type === 'paragraph') && content;
                }),
                textOnly: types.size > 0 && Array.from(types).every((type) => type === 'text' || type === 'paragraph'),
                hasMedia: (blocks || []).some((block) => mediaTypes.has(block?.type)),
                hasRichStructure: (blocks || []).some((block) => {
                    const type = String(block?.type || '');
                    return type && type !== 'text' && type !== 'paragraph' && !mediaTypes.has(type);
                }),
            };
        }

        function getEmbedVideoUrl(url) {
            const value = String(url || '').trim();
            if (!value) return '';
            try {
                const parsed = new URL(value);
                const host = parsed.hostname.toLowerCase();
                const path = parsed.pathname || '';
                if (host.includes('youtu.be')) {
                    const id = path.replace(/^\/+/, '').split('/')[0];
                    return id ? `https://www.youtube.com/embed/${id}` : value;
                }
                if (host.includes('youtube.com') || host.includes('youtube-nocookie.com')) {
                    if (path.startsWith('/embed/')) return `https://www.youtube.com${path.split('?')[0]}`;
                    if (path === '/watch') {
                        const id = parsed.searchParams.get('v');
                        return id ? `https://www.youtube.com/embed/${id}` : value;
                    }
                    if (path.startsWith('/shorts/')) {
                        const id = path.split('/shorts/')[1]?.split('/')[0];
                        return id ? `https://www.youtube.com/embed/${id}` : value;
                    }
                }
                if (host === 'player.vimeo.com') return value;
                if (host.includes('vimeo.com')) {
                    const match = path.match(/\/(?:video\/)?(\d+)/);
                    return match ? `https://player.vimeo.com/video/${match[1]}` : value;
                }
                return value;
            } catch (error) {
                return value;
            }
        }

        function isIframeVideoUrl(url) {
            const value = String(url || '').trim();
            return /youtube(?:-nocookie)?\.com|youtu\.be|vimeo\.com/i.test(value);
        }

        function renderVideoMedia(url) {
            const safeUrl = escapeAttribute(url);
            if (isIframeVideoUrl(url)) {
                return `<div class="modal-media"><iframe src="${escapeAttribute(getEmbedVideoUrl(url))}" title="Embedded video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div>`;
            }
            return `<div class="modal-media"><video controls preload="metadata"><source src="${safeUrl}" type="video/mp4"></video></div>`;
        }

        function renderStructuredBlocks(blocks) {
            return blocks.map((block) => {
                const content = String(block.markdown || block.content || '').trim();
                if ((block.type === 'text' || block.type === 'paragraph') && content) {
                    return `<p class="content-para">${escapeHtml(content).replace(/\n/g, '<br>')}</p>`;
                }
                if (block.type === 'heading_1' && content) {
                    return `<h1 class="content-title">${escapeHtml(content)}</h1>`;
                }
                if (block.type === 'heading_2' && content) {
                    return `<h2 class="content-subtitle">${escapeHtml(content)}</h2>`;
                }
                if (block.type === 'heading_3' && content) {
                    return `<h3 class="content-subtitle" style="font-size:1.05rem;">${escapeHtml(content)}</h3>`;
                }
                if (block.type === 'bulleted_list_item' && content) {
                    return `<p class="content-para">• ${escapeHtml(content)}</p>`;
                }
                if (block.type === 'numbered_list_item' && content) {
                    return `<p class="content-para">1. ${escapeHtml(content)}</p>`;
                }
                if (block.type === 'quote' && content) {
                    return `<blockquote class="note-quote">${escapeHtml(content).replace(/\n/g, '<br>')}</blockquote>`;
                }
                if (block.type === 'code' && content) {
                    return `<pre class="preview-code"><code>${escapeHtml(content)}</code></pre>`;
                }
                if (block.type === 'divider') {
                    return '<hr class="divider-line">';
                }
                if (block.type === 'image' && block.url) {
                    return `<div class="inline-img-wrap"><img src="${escapeAttribute(block.url)}" alt="" class="inline-img"></div>`;
                }
                if (block.type === 'video' && block.url) {
                    return renderVideoMedia(block.url);
                }
                return '';
            }).join('');
        }

        function shouldPreferCanonicalHtml(item, blocks, mediaImageUrls) {
            if (!item.canonical_html) return false;
            if (!blocks || !blocks.length) return true;

            const summary = summarizeStructuredBlocks(blocks);
            const htmlImageUrls = extractImageUrlsFromHtml(item.canonical_html);
            const htmlHasRichFormatting = /<(h[1-6]|blockquote|ul|ol|pre|code|figure)\b/i.test(item.canonical_html);

            if (summary.textOnly && (htmlImageUrls.length > 0 || htmlHasRichFormatting)) return true;
            if (!summary.hasMedia && htmlImageUrls.length > 0) return true;
            if (!summary.hasRichStructure && htmlHasRichFormatting) return true;
            if (hasSuspiciousRepeatedImages(htmlImageUrls, mediaImageUrls)) return false;
            return false;
        }

        function buildInlineMediaFallback(item) {
            const paragraphs = String(item.canonical_text || '暂无内容')
                .split(/\n{2,}/)
                .map((paragraph) => paragraph.trim())
                .filter(Boolean);
            const imageUrls = uniquePreserveOrder(getItemImages(item).map((image) => image.url));

            if (!paragraphs.length) paragraphs.push('暂无内容');
            if (!imageUrls.length) {
                return `<div style="white-space:pre-wrap">${escapeHtml(item.canonical_text || '暂无内容').replace(/\n/g, '<br>')}</div>`;
            }

            const imageAnchors = new Map();
            imageUrls.forEach((url, index) => {
                const anchorIndex = Math.min(
                    paragraphs.length - 1,
                    Math.floor(((index + 1) * paragraphs.length) / (imageUrls.length + 1))
                );
                const bucket = imageAnchors.get(anchorIndex) || [];
                bucket.push(url);
                imageAnchors.set(anchorIndex, bucket);
            });

            let html = '';
            paragraphs.forEach((paragraph, index) => {
                html += `<p class="content-para">${escapeHtml(paragraph).replace(/\n/g, '<br>')}</p>`;
                const anchoredImages = imageAnchors.get(index) || [];
                anchoredImages.forEach((url) => {
                    html += `<div class="inline-img-wrap"><img src="${escapeAttribute(url)}" alt="" class="inline-img"></div>`;
                });
            });
            return html;
        }

        function renderWebArticle(item, videos) {
            const mediaImageUrls = getItemImages(item).map((image) => image.url);
            const blocks = parseContentBlocks(item);
            let bodyHtml = '';

            if (blocks && blocks.length > 0 && !shouldPreferCanonicalHtml(item, blocks, mediaImageUrls)) {
                const blockImageUrls = blocks
                    .filter((block) => block.type === 'image' && block.url)
                    .map((block) => block.url);
                const summary = summarizeStructuredBlocks(blocks);
                if (summary.hasText && !hasSuspiciousRepeatedImages(blockImageUrls, mediaImageUrls)) {
                    bodyHtml = renderStructuredBlocks(blocks);
                }
            }

            if (!bodyHtml && item.canonical_html) {
                const htmlImageUrls = extractImageUrlsFromHtml(item.canonical_html);
                if (!hasSuspiciousRepeatedImages(htmlImageUrls, mediaImageUrls)) {
                    bodyHtml = `<div class="article-html" style="margin-top: 0;">${item.canonical_html}</div>`;
                }
            }

            if (!bodyHtml) {
                bodyHtml = buildInlineMediaFallback(item);
            }

            let html = '';
            if (videos.length > 0 && !/<(video|iframe)\b/i.test(bodyHtml)) {
                html += renderVideoMedia(videos[0].url);
            }
            html += bodyHtml;
            return html;
        }

        function updateCommandPaletteState() {
            const value = urlInput.value.trim();
            const platformLabel = platformFilter.options[platformFilter.selectedIndex]?.textContent || '全部';
            const resolvedUrl = resolveCommandUrl(value);
            const hasEmbeddedUrl = Boolean(resolvedUrl && !isLikelyUrl(value));

            if (!value) {
                setCommandActionsVisible(true);
                extractBtn.disabled = true;
                extractBtnLabel.textContent = '粘贴链接或输入关键词';
                extractBtnMeta.textContent = 'ENTER';
                commandHelpText.innerHTML = '输入 <strong>链接</strong> 会直接导入，输入 <strong>文字</strong> 会搜索已保存内容。';
                clearCommandResults();
                return;
            }

            extractBtn.disabled = false;
            if (resolvedUrl) {
                setCommandActionsVisible(true);
                extractBtnLabel.textContent = hasEmbeddedUrl ? '导入识别出的链接' : '导入这个链接';
                extractBtnMeta.textContent = 'ENTER';
                commandHelpText.innerHTML = hasEmbeddedUrl
                    ? `已从分享文案中识别到 <strong>链接</strong>：<code>${escapeHtml(truncateText(resolvedUrl, 42))}</code>`
                    : '识别为 <strong>链接</strong>，按 Enter 会直接导入到 Everything Capture。';
                clearCommandResults();
                return;
            }

            setCommandActionsVisible(false);
            extractBtnLabel.textContent = `搜索资料库 “${truncateText(value, 18)}”`;
            extractBtnMeta.textContent = `${platformLabel} · ENTER`;
            commandHelpText.innerHTML = `识别为 <strong>搜索意图</strong>，会结合标题、正文、链接和主题相关词做智能排序。`;
            scheduleCommandSearch(value);
        }

        async function fetchCommandResults(query) {
            const trimmedQuery = (query || '').trim();
            if (!trimmedQuery || resolveCommandUrl(trimmedQuery)) {
                clearCommandResults();
                return;
            }

            const requestId = ++commandRequestId;
            commandResults.innerHTML = '<div class="suggestion-empty">搜索中...</div>';
            try {
                const response = await fetch(`/api/items?${getActiveSearchParams(6, trimmedQuery).toString()}`);
                if (!response.ok) throw new Error('API Error');
                const results = await response.json();
                if (requestId !== commandRequestId) return;
                commandSearchResults = results;
                if (!results.length) {
                    commandResults.innerHTML = '<div class="suggestion-empty">没有找到匹配内容</div>';
                    return;
                }

                commandResults.innerHTML = results.map((item) => {
                    const snippet = truncateText(item.canonical_text || item.source_url || '无正文内容', 44);
                    return `
                        <button class="suggestion-item" type="button" onclick="openCommandResult('${item.id}')">
                            <div class="command-result-body">
                                <span class="command-result-title">${escapeHtml(item.title || '无标题')}</span>
                                <span class="command-result-snippet">${escapeHtml(snippet)}</span>
                            </div>
                            <span class="suggestion-meta">${platformDisplayLabel(item)} · ${formatDate(item.created_at)}</span>
                        </button>
                    `;
                }).join('');
            } catch (error) {
                if (requestId !== commandRequestId) return;
                commandResults.innerHTML = '<div class="suggestion-empty">搜索失败，请稍后重试</div>';
            }
        }

        function applyCommandSearch() {
            const query = urlInput.value.trim();
            if (!query) {
                showToast('请输入关键词', 'error');
                return;
            }
            filterInput.value = query;
            fetchItems();
            closeCommandPalette();
        }

        function runCommandAction() {
            const value = urlInput.value.trim();
            if (!value) {
                showToast('请输入链接或关键词', 'error');
                return;
            }
            if (resolveCommandUrl(value)) {
                extractURL();
                return;
            }
            applyCommandSearch();
        }

        function openCommandResult(itemId) {
            const item = commandSearchResults.find((entry) => entry.id === itemId);
            if (!item) return;
            filterInput.value = urlInput.value.trim();
            fetchItems();
            closeCommandPalette();
            openModalByItem(item);
        }

        async function extractURL(urlOverride = null) {
            const rawValue = urlOverride ?? urlInput.value.trim();
            const url = resolveCommandUrl(rawValue);
            if (!rawValue) { showToast('请输入链接', 'error'); return; }
            if (!url) { showToast('请输入有效的 http/https 链接', 'error'); return; }

            extractBtn.disabled = true;
            extractBtn.classList.add('is-loading');
            extractBtnLabel.textContent = '处理中...';
            try {
                const resp = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await resp.json();
                if (resp.ok) {
                    const mediaInfo = data.media_count > 0 ? `，${data.media_count} 个媒体` : '';
                    showToast(`收录成功：${data.title} (${data.text_length} 字${mediaInfo}，平台：${data.platform})`, 'success');
                    urlInput.value = '';
                    clearCommandResults();
                    updateCommandPaletteState();
                    closeCommandPalette();
                    fetchItems();
                } else {
                    showToast(`失败：${data.detail || '未知错误'}`, 'error');
                }
            } catch (e) {
                showToast('网络错误：' + e.message, 'error');
            } finally {
                extractBtn.disabled = false;
                extractBtn.classList.remove('is-loading');
                updateCommandPaletteState();
            }
        }

        urlInput.addEventListener('input', updateCommandPaletteState);
        urlInput.addEventListener('paste', (e) => {
            const pastedText = e.clipboardData?.getData('text')?.trim();
            const resolvedUrl = resolveCommandUrl(pastedText);
            if (!pastedText || !resolvedUrl || isLikelyUrl(pastedText)) return;

            e.preventDefault();
            urlInput.value = pastedText;
            updateCommandPaletteState();
            extractURL(resolvedUrl);
        });
        urlInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                runCommandAction();
            }
        });
        commandOverlay.addEventListener('click', e => {
            if (e.target === commandOverlay) closeCommandPalette();
        });
        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if ((e.metaKey || e.ctrlKey) && key === 'k') {
                e.preventDefault();
                if (commandOverlay.classList.contains('active')) closeCommandPalette();
                else openCommandPalette();
            }
            if (e.key === 'Escape' && folderPickerOverlay.classList.contains('active')) {
                closeFolderPickerDialog();
                return;
            }
            if (e.key === 'Escape' && commandOverlay.classList.contains('active')) {
                closeCommandPalette();
                return;
            }
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
                closeModalDialog();
            }
        });

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${month}/${day}`;
        }

        function renderSyncBadges(item) {
            return `
                <div class="knowledge-dots" aria-label="知识库状态">
                    <span class="knowledge-dot notion ${item.notion_page_id ? 'is-ready' : 'is-idle'}" title="Notion${item.notion_page_id ? '已同步' : '未同步'}"></span>
                    <span class="knowledge-dot obsidian ${item.obsidian_path ? 'is-ready' : 'is-idle'}" title="Obsidian${item.obsidian_path ? '已同步' : '未同步'}"></span>
                </div>
            `;
        }

        function setModalFullscreen(nextValue) {
            isModalFullscreen = typeof nextValue === 'boolean' ? nextValue : !isModalFullscreen;
            modalShell.classList.toggle('is-fullscreen', isModalFullscreen);
            toggleFullscreenBtn.setAttribute('aria-label', isModalFullscreen ? '退出全屏' : '全屏阅读');
            toggleFullscreenBtn.innerHTML = isModalFullscreen
                ? `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 3H3v6M15 3h6v6M21 15v6h-6M3 15v6h6"></path></svg>`
                : `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M8 21H3v-5"></path></svg>`;
        }

        function getItemThumbnail(item) {
            if (!item.media || item.media.length === 0) return null;
            const images = item.media.filter(m => m.type === 'image');
            const covers = item.media.filter(m => m.type === 'cover');

            // 优先选择封面图 (Cover 通常是静态的)
            if (covers.length > 0) return covers[0];

            // 其次选择非 GIF 的图片
            const staticImages = images.filter(m => !m.url.toLowerCase().endsWith('.gif'));
            if (staticImages.length > 0) return staticImages[0];

            // 最后没办法了再选第一张图 (可能是 GIF)
            return images[0] || null;
        }

        function normalizePlatform(platform, sourceUrl = '') {
            const value = (platform || '').toLowerCase();
            if (value.includes('douyin') || value.includes('抖音') || value.includes('tiktok')) return 'douyin';
            if (value.includes('xiaohongshu') || value.includes('小红书') || value.includes('rednote') || value === 'xhs') return 'xiaohongshu';
            if (value.includes('wechat') || value.includes('weixin') || sourceUrl.includes('mp.weixin.qq.com') || sourceUrl.includes('weixin.qq.com')) return 'wechat';
            if (value === 'x' || value.includes('twitter')) return 'x';
            if (value === 'general' || value === 'generic' || value === 'web' || value === 'site') return 'web';
            return value;
        }

        function platformDisplayLabel(item) {
            const platform = normalizePlatform(item.platform || '', (item.source_url || '').toLowerCase());
            if (platform === 'web') return 'web';
            return platform || 'web';
        }

        function formatRelativeTime(dateStr) {
            const value = new Date(dateStr);
            if (Number.isNaN(value.getTime())) return formatDate(dateStr);

            const diffMs = Date.now() - value.getTime();
            const diffMinutes = Math.max(0, Math.floor(diffMs / (1000 * 60)));
            const diffHours = Math.max(0, Math.floor(diffMinutes / 60));
            const diffDays = Math.max(1, Math.floor(diffHours / 24));

            if (diffMinutes < 5) return '刚刚';
            if (diffMinutes < 60) return `${diffMinutes}分钟前`;
            if (diffHours < 24) return `${diffHours}小时前`;
            return `${diffDays}天前`;
        }

        function renderPlatformMark(item) {
            const platform = normalizePlatform(item.platform || '', (item.source_url || '').toLowerCase());
            switch (platform) {
                case 'wechat':
                    return '<span class="platform-glyph">微</span>';
                case 'douyin':
                    return '<span class="platform-glyph">抖</span>';
                case 'xiaohongshu':
                    return '<span class="platform-glyph">红</span>';
                case 'x':
                    return '<span class="platform-glyph">X</span>';
                default:
                    return '<span class="platform-glyph">W</span>';
            }
        }

        function renderCardTags(item, length) {
            const values = [];
            const platform = platformDisplayLabel(item);
            if (platform) values.push(platform);
            if (item.folder_name) values.push(item.folder_name);
            if (!values.length && length > 0) values.push(`${length}字`);

            return uniquePreserveOrder(values)
                .slice(0, 3)
                .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
                .join('');
        }

        function renderCardPreview(item) {
            const media = Array.isArray(item.media) ? item.media : [];
            const images = media.filter((entry) => entry.type === 'image');
            const videos = media.filter((entry) => entry.type === 'video');
            const thumb = getItemThumbnail(item);
            const badge = images.length > 1
                ? `<span class="card-media-badge">${images.length} 张图片</span>`
                : (videos.length > 0 ? '<span class="card-media-badge">视频</span>' : '');
            const previewBody = thumb
                ? `<img src="${escapeAttribute(thumb.url)}" loading="lazy" alt="">`
                : `<div class="card-preview-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <path d="m21 15-5-5L5 21"></path>
                        </svg>
                    </div>`;

            return `
                <div class="card-preview">
                    ${previewBody}
                    ${renderSelectionIndicator(item.id).replace('select-indicator', 'select-indicator card-selection')}
                    <div class="card-icon">${renderPlatformMark(item)}</div>
                    ${badge}
                </div>
            `;
        }

        async function fetchItems() {
            const requestId = ++libraryRequestId;
            try {
                const response = await fetch(`/api/items?${getActiveSearchParams(200).toString()}`);
                if (!response.ok) throw new Error('API Error');
                const totalCount = Number(response.headers.get('X-Total-Count') || '0');
                const visibleCount = Number(response.headers.get('X-Visible-Count') || '0');
                const returnedCount = Number(response.headers.get('X-Returned-Count') || '0');
                const nextItems = await response.json();
                if (requestId !== libraryRequestId) return;
                itemsData = nextItems;
                filteredEntries = itemsData;
                latestTotalCount = totalCount;
                latestVisibleCount = visibleCount;
                latestReturnedCount = returnedCount || itemsData.length;
                const hasKeyword = !!filterInput.value.trim();
                const hasPlatformFilter = platformFilter.value !== 'all';
                const hasFolderFilter = currentFolderScope !== 'all';
                setStatsSummary(
                    latestTotalCount || itemsData.length,
                    latestVisibleCount || itemsData.length,
                    latestReturnedCount || itemsData.length,
                    hasKeyword || hasPlatformFilter || hasFolderFilter
                );
                renderItems(filteredEntries);
            } catch (error) {
                setStatsMessage('加载失败');
                grid.className = 'grid';
                grid.innerHTML = '<div class="empty-state">无法连接到后端 API</div>';
            }
        }

        async function refreshRemoteSyncStatus(itemIds, requestId) {
            if (!Array.isArray(itemIds) || itemIds.length === 0) return;
            if (remoteSyncRefreshInFlight) return;

            try {
                remoteSyncRefreshInFlight = true;
                const response = await fetch('/api/connect/sync-status/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_ids: itemIds }),
                });
                if (!response.ok) return;

                const data = await response.json();
                if (requestId !== libraryRequestId || !data || !Array.isArray(data.items)) return;

                const statusMap = new Map(data.items.map((item) => [item.id, item]));
                let changed = false;

                itemsData = itemsData.map((item) => {
                    const nextStatus = statusMap.get(item.id);
                    if (!nextStatus) return item;
                    if (item.notion_page_id === nextStatus.notion_page_id && item.obsidian_path === nextStatus.obsidian_path) {
                        return item;
                    }
                    changed = true;
                    return {
                        ...item,
                        notion_page_id: nextStatus.notion_page_id || null,
                        obsidian_path: nextStatus.obsidian_path || null,
                    };
                });

                commandSearchResults = commandSearchResults.map((item) => {
                    const nextStatus = statusMap.get(item.id);
                    if (!nextStatus) return item;
                    return {
                        ...item,
                        notion_page_id: nextStatus.notion_page_id || null,
                        obsidian_path: nextStatus.obsidian_path || null,
                    };
                });

                filteredEntries = itemsData;

                if (changed) {
                    renderItems(filteredEntries);
                    const refreshedItem = currentOpenItemId
                        ? itemsData.find((item) => item.id === currentOpenItemId) || commandSearchResults.find((item) => item.id === currentOpenItemId)
                        : null;
                    if (refreshedItem && currentOpenItemId === refreshedItem.id) {
                        openModalByItem(refreshedItem);
                    }
                }
            } catch (error) {
                console.warn('Failed to refresh remote sync status', error);
            } finally {
                remoteSyncRefreshInFlight = false;
            }
        }

        function getTrackedRemoteSyncItemIds(entries = itemsData) {
            return (entries || [])
                .filter((item) => item.notion_page_id || item.obsidian_path)
                .map((item) => item.id);
        }

        function scheduleRemoteSyncRefresh(options = {}) {
            const { delay = 0, force = false, itemIds = null } = options;
            if (remoteSyncRefreshQueuedTimer) {
                window.clearTimeout(remoteSyncRefreshQueuedTimer);
            }
            remoteSyncRefreshQueuedTimer = window.setTimeout(() => {
                remoteSyncRefreshQueuedTimer = null;
                triggerRemoteSyncRefresh({ force, itemIds });
            }, delay);
        }

        function triggerRemoteSyncRefresh(options = {}) {
            const { force = false, itemIds = null } = options;
            if (document.visibilityState === 'hidden') return;
            if (remoteSyncRefreshInFlight) return;

            const nextItemIds = Array.isArray(itemIds) ? itemIds.filter(Boolean) : getTrackedRemoteSyncItemIds();
            if (nextItemIds.length === 0) return;

            const now = Date.now();
            if (!force && now - lastRemoteSyncRefreshAt < REMOTE_SYNC_REFRESH_COOLDOWN_MS) return;

            lastRemoteSyncRefreshAt = now;
            refreshRemoteSyncStatus(nextItemIds, libraryRequestId);
        }

        function renderItems(entries) {
            if (entries.length === 0) {
                grid.className = currentView === 'gallery' ? 'grid' : 'list-view';
                grid.innerHTML = filterInput.value.trim() || platformFilter.value !== 'all' || currentFolderScope !== 'all'
                    ? `<div class="empty-state">${currentFolderScope === 'folder' && !filterInput.value.trim() && platformFilter.value === 'all' ? '这个文件夹里还没有内容。' : '没有找到匹配内容，请换个关键词或平台试试。'}</div>`
                    : '<div class="empty-state">暂无收录内容，请在 App 中添加。</div>';
                return;
            }

            if (currentView === 'list') {
                grid.className = 'list-view';
                grid.innerHTML = entries.map((item) => {
                    const textPreview = item.canonical_text ? item.canonical_text.substring(0, 120) + '...' : '无正文内容';
                    const length = item.canonical_text ? item.canonical_text.length : 0;
                    const thumb = getItemThumbnail(item);
                    const activeClass = currentOpenItemId === item.id ? ' is-active' : '';
                    const selectableClass = selectionMode ? ' is-selectable' : '';
                    const thumbHtml = thumb
                        ? `<div class="list-thumb"><img src="${thumb.url}" loading="lazy" alt=""></div>`
                        : `<div class="list-thumb"></div>`;
                    return `
                        <div class="list-row${activeClass}${selectableClass}" onclick="handleItemPrimaryAction('${item.id}')">
                            <div class="list-main">
                                ${renderSelectionIndicator(item.id)}
                                ${thumbHtml}
                                <div class="list-content">
                                    <div class="list-title-row">
                                        <div class="list-title">${item.title || '无标题'}</div>
                                    </div>
                                    <div class="list-preview">${textPreview}</div>
                                </div>
                            </div>
                            <div class="list-side">
                                <div class="list-meta">
                                    <span class="list-stat">${platformDisplayLabel(item)}</span>
                                    <span class="list-stat">${formatDate(item.created_at)}</span>
                                    <span class="list-stat">${length} 字</span>
                                    ${renderFolderTag(item)}
                                </div>
                                <div class="list-actions">
                                    ${renderSyncBadges(item)}
                                    ${renderFolderActionButton(item)}
                                    <button onclick="deleteItem('${item.id}', event)" class="delete-btn" title="删除">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                    </button>
                                    <a href="${item.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">原文 ↗</a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                return;
            }

            grid.className = 'grid';
            grid.innerHTML = entries.map((item) => {
                const length = item.canonical_text ? item.canonical_text.length : 0;
                const activeClass = currentOpenItemId === item.id ? ' is-active' : '';
                const selectableClass = selectionMode ? ' is-selectable' : '';
                const title = escapeHtml(item.title || '无标题');
                const sourceLabel = escapeHtml(`来自 ${platformDisplayLabel(item)}`);
                const relativeTime = escapeHtml(formatRelativeTime(item.created_at));
                const tagsHtml = renderCardTags(item, length) || '<span class="tag">未分类</span>';

                return `
                    <div class="card${activeClass}${selectableClass}" onclick="handleItemPrimaryAction('${item.id}')">
                        ${renderCardPreview(item)}
                        <div class="card-content">
                            <div class="card-meta-row">
                                <div class="card-meta">
                                    <span>${sourceLabel}</span>
                                    <span>•</span>
                                    <span>${relativeTime}</span>
                                </div>
                                ${renderSyncBadges(item)}
                            </div>
                            <h3 class="card-title">${title}</h3>
                            <div class="card-bottom-row">
                                <div class="tags">
                                    ${tagsHtml}
                                </div>
                                <div class="card-footer-actions">
                                    ${renderFolderActionButton(item)}
                                    <button onclick="deleteItem('${item.id}', event)" class="delete-btn" title="删除">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                                    </button>
                                    <a href="${item.source_url}" target="_blank" class="source-link" onclick="event.stopPropagation()">
                                        原文 ↗
                                </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setView(view) {
            currentView = view;
            galleryViewBtn.classList.toggle('active', view === 'gallery');
            listViewBtn.classList.toggle('active', view === 'list');
            renderItems(filteredEntries);
        }

        filterInput.addEventListener('input', scheduleLibrarySearch);
        platformFilter.addEventListener('change', () => {
            updateCommandPaletteState();
            fetchItems();
        });
        galleryViewBtn.addEventListener('click', () => setView('gallery'));
        listViewBtn.addEventListener('click', () => setView('list'));
        selectionModeBtn.addEventListener('click', () => setSelectionMode());
        bulkMoveBtn.addEventListener('click', () => openFolderPicker(Array.from(selectedItemIds), null, '批量加入文件夹'));
        createFolderBtn.addEventListener('click', () => openCreateFolderPrompt());
        folderSearchInput.addEventListener('input', (e) => {
            folderSearchQuery = e.target.value || '';
            renderFolderNavigation();
        });
        toggleSidebarBtn.addEventListener('click', () => {
            sidebarExpanded = !sidebarExpanded;
            updateSidebarState();
        });
        closeFolderPicker.addEventListener('click', () => closeFolderPickerDialog());
        folderCreateConfirmBtn.addEventListener('click', () => createFolderAndApply());
        folderCreateInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                createFolderAndApply();
            }
        });

        async function deleteItem(id, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这条内容吗？删除后不可恢复。')) return;

            try {
                const response = await fetch(`/api/items/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('已删除', 'deleted');
                    clearSelection();
                    await Promise.all([fetchFolders(), fetchItems()]);
                } else {
                    const data = await response.json();
                    showToast('删除失败: ' + (data.detail || '未知错误'), 'error');
                }
            } catch (error) {
                showToast('网络错误：' + error.message, 'error');
            }
        }

        function openModalById(itemId) {
            const item = itemsData.find((entry) => entry.id === itemId);
            if (!item) return;
            openModalByItem(item);
        }

        function openModalByItem(item) {
            currentOpenItemId = item.id;
            renderItems(filteredEntries);
            setModalFullscreen(false);
            modalTitle.innerText = item.title || '无标题';
            readerStatusDots.innerHTML = `
                <span class="knowledge-dot notion ${item.notion_page_id ? 'is-ready' : 'is-idle'}" title="Notion${item.notion_page_id ? '已同步' : '未同步'}"></span>
                <span class="knowledge-dot obsidian ${item.obsidian_path ? 'is-ready' : 'is-idle'}" title="Obsidian${item.obsidian_path ? '已同步' : '未同步'}"></span>
            `;
            const platform = normalizePlatform(item.platform || '');
            const isCarouselPlatform = platform === 'xiaohongshu' || platform === 'douyin';
            const videos = (item.media || []).filter(m => m.type === 'video');

            if (isCarouselPlatform) {
                // ── XHS / 抖音：图片轮播在顶部 ──────────────────────────────
                const images = (item.media || []).filter(m => m.type === 'image').sort((a, b) => a.display_order - b.display_order);
                let html = '';
                if (videos.length > 0) {
                    const cover = (item.media || []).find(m => m.type === 'cover');
                    html += `<div class="modal-media"><video controls preload="metadata" poster="${cover ? cover.url : ''}"><source src="${videos[0].url}" type="video/mp4"></video></div>`;
                }
                if (images.length > 0) {
                    html += `<div class="modal-media"><div class="media-gallery">${images.map(img => `<img src="${img.url}" alt="">`).join('')}</div>${images.length > 1 ? '<div class="gallery-hint">← 左右滑动查看更多图片 →</div>' : ''}</div>`;
                }
                html += `<div style="white-space:pre-wrap">${item.canonical_text || '暂无内容'}</div>`;
                modalContent.innerHTML = html;

            } else {
                // ── 通用网页 / 微信：优先恢复原始图文流，再按稳妥策略回退 ──────────────
                modalContent.innerHTML = renderWebArticle(item, videos);
            }

            modalFooter.innerHTML = `
                <div class="modal-footer-actions">
                    <button onclick="openFolderPicker(['${item.id}'], ${item.folder_id ? `'${item.folder_id}'` : 'null'}, '移动到文件夹')" class="extract-btn modal-action-btn">移动到文件夹</button>
                    <button onclick="syncItem('${item.id}', 'notion')" class="extract-btn modal-action-btn">${item.notion_page_id ? '再次检查 Notion 同步' : '同步至 Notion'}</button>
                    <button onclick="syncItem('${item.id}', 'obsidian')" class="extract-btn modal-action-btn">${item.obsidian_path ? '再次检查 Obsidian 同步' : '同步至 Obsidian'}</button>
                    <button onclick="downloadZip('${item.id}')" class="extract-btn modal-action-btn">下载 ZIP</button>
                </div>
            `;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function syncItem(id, target) {
            showToast(`正在后台同步至 ${target}...`, 'info');
            try {
                const res = await fetch(`/api/connect/${target}/sync/${id}`, { method: 'POST' });
                const data = await res.json();
                if (res.ok) {
                    const currentItem = itemsData.find(item => item.id === id);
                    if (currentItem) {
                        if (target === 'notion' && data.notion_page_id) currentItem.notion_page_id = data.notion_page_id;
                        if (target === 'obsidian' && data.obsidian_path) currentItem.obsidian_path = data.obsidian_path;
                    }
                    const commandItem = commandSearchResults.find((item) => item.id === id);
                    if (commandItem) {
                        if (target === 'notion' && data.notion_page_id) commandItem.notion_page_id = data.notion_page_id;
                        if (target === 'obsidian' && data.obsidian_path) commandItem.obsidian_path = data.obsidian_path;
                    }
                    renderItems(filteredEntries);
                    const refreshedItem = itemsData.find(item => item.id === id) || commandSearchResults.find(item => item.id === id);
                    if (currentOpenItemId === id && refreshedItem) {
                        openModalByItem(refreshedItem);
                    }
                    if (target === 'notion' && data.target_object) {
                        const targetLabel = data.target_object === 'database' ? 'Database' : 'Page';
                        const targetName = data.target_title || data.target_id || 'Untitled';
                        showToast(`已同步到 Notion ${targetLabel}: ${targetName}`, 'success');
                    } else {
                        showToast(`同步成功 (ID: ${data[`${target}_page_id`] || data.obsidian_path || '已同步'})`, 'success');
                    }
                } else {
                    let message = data.detail || '未知错误';
                    if (typeof message === 'string' && message.includes('notion_database_id')) {
                        message = 'Notion 已授权，但还没有配置 Database ID/URL。请先在设置里选择目标数据库。';
                    }
                    showToast(`同步失败: ${message}`, 'error');
                }
            } catch (e) {
                showToast(`同步出错: ${e.message}`, 'error');
            }
        }

        function downloadZip(id) {
            window.location.href = `/api/items/${id}/export/zip`;
        }

        function closeModalDialog() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
            currentOpenItemId = null;
            setModalFullscreen(false);
            readerStatusDots.innerHTML = '';
            modalFooter.innerHTML = '';
            renderItems(filteredEntries);
        }

        closeModal.onclick = () => {
            closeModalDialog();
        };

        closeModal.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                closeModalDialog();
            }
        });

        modalOverlay.onclick = (e) => {
            if (e.target === modalOverlay) closeModalDialog();
        };
        settingsOverlay.onclick = (e) => {
            if (e.target === settingsOverlay) closeSettingsModal.onclick();
        };
        folderPickerOverlay.onclick = (e) => {
            if (e.target === folderPickerOverlay) closeFolderPickerDialog();
        };

        window.addEventListener('beforeunload', () => {
            if (remoteSyncRefreshTimer) window.clearInterval(remoteSyncRefreshTimer);
            if (remoteSyncRefreshQueuedTimer) window.clearTimeout(remoteSyncRefreshQueuedTimer);
        });

        document.addEventListener('click', (e) => {
            if (!folderContextMenu.contains(e.target)) {
                closeFolderContextMenu();
            }
        });

        toggleFullscreenBtn.onclick = () => {
            setModalFullscreen();
        };

        toggleFullscreenBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                setModalFullscreen();
            }
        });

        // Fetch on load
        updateSidebarState();
        fetchFolders();
        fetchItems();
        updateCommandPaletteState();

        // Check URL for OAuth callback results
        const urlParams = new URLSearchParams(window.location.search);
        const notionAuth = urlParams.get('notion_auth');
        if (notionAuth === 'success') {
            setTimeout(async () => {
                const settings = await loadSettings();
                if (settings?.notion_ready) {
                    showToast('Notion 授权成功，已可直接同步。', 'success');
                } else {
                    showToast('Notion 授权成功，但还需要选择一个同步目标才能同步。', 'info');
                }
            }, 500);
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (notionAuth === 'partial') {
            setTimeout(async () => {
                await loadSettings();
                showToast('Notion 授权成功，但当前还缺少同步目标。请在设置里选择一个页面或数据库。', 'info');
            }, 500);
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
        } else if (notionAuth === 'failed') {
            const errorStr = urlParams.get('error') || 'Unknown error';
            setTimeout(() => showToast(`Notion Authentication Failed: ${errorStr}`, 'error'), 500);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
