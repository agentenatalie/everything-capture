<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Logo — Chubby Star</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    background: #f5f5f5;
    color: #333;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    padding: 48px;
    text-align: center;
  }
  .card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #333; }
  .card p { font-size: 13px; color: #888; margin-bottom: 28px; line-height: 1.5; }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-bottom: 12px;
  }
  .sizes { font-size: 11px; color: #aaa; margin-top: 12px; }
</style>
</head>
<body>

  <div class="card">
    <h3>Chubby Star (Stroke)</h3>
    <p>取景器 + 圆润描边星星，居中对齐</p>
    <div class="logo-row">
      <!-- 128px -->
      <svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="112" height="112" rx="28" fill="#fff" stroke="#111" stroke-width="3"/>
        <path d="M36 50 L36 38 Q36 36, 38 36 L50 36" stroke="#111" stroke-width="6" stroke-linecap="round" fill="none"/>
        <path d="M78 36 L90 36 Q92 36, 92 38 L92 50" stroke="#111" stroke-width="6" stroke-linecap="round" fill="none"/>
        <path d="M92 78 L92 90 Q92 92, 90 92 L78 92" stroke="#111" stroke-width="6" stroke-linecap="round" fill="none"/>
        <path d="M50 92 L38 92 Q36 92, 36 90 L36 78" stroke="#111" stroke-width="6" stroke-linecap="round" fill="none"/>
        <path d="M64 50 L68 59 L79 57 L71 65 L76 76 L64 71 L52 76 L57 65 L49 57 L60 59 Z"
              stroke="#111" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- 48px -->
      <svg width="48" height="48" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="112" height="112" rx="28" fill="#fff" stroke="#111" stroke-width="4"/>
        <path d="M36 50 L36 38 Q36 36, 38 36 L50 36" stroke="#111" stroke-width="8" stroke-linecap="round" fill="none"/>
        <path d="M78 36 L90 36 Q92 36, 92 38 L92 50" stroke="#111" stroke-width="8" stroke-linecap="round" fill="none"/>
        <path d="M92 78 L92 90 Q92 92, 90 92 L78 92" stroke="#111" stroke-width="8" stroke-linecap="round" fill="none"/>
        <path d="M50 92 L38 92 Q36 92, 36 90 L36 78" stroke="#111" stroke-width="8" stroke-linecap="round" fill="none"/>
        <path d="M64 50 L68 59 L79 57 L71 65 L76 76 L64 71 L52 76 L57 65 L49 57 L60 59 Z"
              stroke="#111" stroke-width="5.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      </svg>
      <!-- 16px -->
      <svg width="16" height="16" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="112" height="112" rx="28" fill="#fff" stroke="#111" stroke-width="6"/>
        <path d="M64 46 L69 57 L83 55 L73 65 L80 78 L64 72 L48 78 L55 65 L45 55 L59 57 Z"
              fill="#111"/>
      </svg>
    </div>
    <div class="sizes">128px &nbsp; 48px &nbsp; 16px</div>
  </div>

</body>
</html>
